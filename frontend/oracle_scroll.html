<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle-story</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --scroll:#c4a265;--scroll-l:#d9b97a;--scroll-d:#a6834a;--edge:#8b6f3e;
  --ink:#0a0908;--gold:#c9a84c;--gold-l:#e8d5a0;--text:#2a1a0a;--muted:#5a4528;
}
html{overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
body{width:100%;min-height:100vh;font-family:'Microsoft YaHei','微软雅黑','PingFang SC','Noto Sans SC','Noto Serif SC',sans-serif;background:var(--scroll);color:var(--text);margin:0;padding:0;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.sphere-viewport{
  position:relative;width:100%;height:100vh;overflow:hidden;
  transition:height .55s cubic-bezier(.25,.1,.25,1);
}
.sphere-viewport.collapsed{height:120px}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:block;z-index:1;user-select:none;-webkit-user-select:none}
#sphereCanvas{pointer-events:auto;cursor:grab;z-index:5;will-change:transform}
#sphereCanvas:active{cursor:grabbing}
#fxCanvas{z-index:6}
.main-title{
  position:absolute;top:28px;left:0;right:0;z-index:20;
  text-align:center;pointer-events:none;
  font-size:30px;font-weight:300;color:var(--text);
  letter-spacing:18px;font-family:'Noto Serif SC',serif;
  transition:all .55s cubic-bezier(.25,.1,.25,1);
}
.sphere-viewport.collapsed .main-title{
  font-size:14px;top:14px;letter-spacing:6px;opacity:.45;
}
.subtitle{
  position:absolute;left:0;right:0;z-index:20;
  text-align:center;pointer-events:none;
  font-size:12px;color:var(--muted);letter-spacing:10px;
  font-family:'Noto Serif SC',serif;
  opacity:.4;
  transition:opacity .4s;
  white-space:nowrap;
}
.sphere-viewport.collapsed .subtitle{opacity:0;pointer-events:none}
.content{
  position:relative;z-index:10;max-width:860px;margin:0 auto;
  padding:50px 24px 100px;background:linear-gradient(180deg,#c4a265,#b89560);
}
.placeholder{text-align:center;padding:80px 20px;color:var(--muted);opacity:.5}
.placeholder p{font-size:13px;letter-spacing:3px;line-height:2}
.detail{display:none;animation:fadeUp .5s ease}
.detail.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.d-hero{text-align:center;padding:20px 0 24px;border-bottom:2px solid var(--edge);margin-bottom:24px}
.d-oracle{font-size:90px;font-weight:900;color:var(--text);line-height:1}
.d-modern{font-size:20px;color:var(--muted);margin-top:10px;letter-spacing:4px}
.d-pinyin{font-size:12px;color:var(--muted);opacity:.7;margin-top:4px;font-style:italic}
.d-cat{margin-top:12px}
.cat-tag{display:inline-block;padding:4px 14px;border-radius:4px;font-size:11px;font-weight:600;margin:3px;letter-spacing:1px}
.tag-象形{background:#8B4513;color:#f5edd6}
.tag-会意{background:#2F4F4F;color:#e0f0f0}
.tag-指事{background:#4B0082;color:#f0e0ff}
.tag-假借{background:#8B0000;color:#ffe0e0}
.d-section{margin-bottom:24px}
.d-section h3{font-size:16px;color:var(--text);font-weight:700;margin-bottom:12px;padding-left:12px;border-left:3px solid var(--edge);letter-spacing:2px}
.d-section p,.d-section li{font-size:15px;line-height:2;color:var(--muted)}
.d-section ul{padding-left:18px}
.placeholder{text-align:center;padding:80px 20px;color:var(--muted);opacity:.6;font-size:15px;letter-spacing:2px;line-height:2}
.quote{background:rgba(42,26,10,.06);border-radius:6px;padding:12px 16px;margin:8px 0;font-size:15px;color:var(--text);line-height:2;border-right:2px solid var(--edge)}
.quote .tr{font-size:14px;color:var(--muted);margin-top:8px;font-style:normal;border-top:1px dashed var(--edge);padding-top:8px;line-height:1.8}
.deriv{background:rgba(255,255,255,.25);border-radius:8px;padding:16px;margin-top:10px}
.deriv-step{display:flex;align-items:flex-start;margin-bottom:8px}
.deriv-step:last-child{margin-bottom:0}
.dn{width:22px;height:22px;border-radius:50%;background:var(--edge);color:#f5edd6;font-size:11px;font-weight:700;text-align:center;line-height:22px;margin-right:10px;flex-shrink:0}
.dt{font-size:12.5px;line-height:1.8;color:var(--muted)}
.da{text-align:center;color:var(--edge);font-size:14px;margin:2px 0 2px 11px;opacity:.5}
.recog{background:rgba(255,255,255,.2);border-radius:6px;padding:12px 14px;margin-top:8px}
.recog .m{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.recog .d{font-size:11.5px;color:var(--muted);line-height:1.8}
.related{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.rc{padding:6px 12px;background:rgba(255,255,255,.3);border-radius:6px;font-size:14px;color:var(--text);cursor:pointer;transition:all .2s;border:1px solid transparent}
.rc:hover{background:rgba(255,255,255,.5);border-color:var(--edge);transform:translateY(-2px)}
.img-gallery{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.img-thumb-wrap{text-align:center;cursor:pointer;transition:transform .2s}
.img-thumb-wrap:hover{transform:translateY(-3px)}
.img-thumb{width:160px;height:160px;border-radius:6px;border:2px solid var(--edge);box-shadow:0 2px 8px rgba(0,0,0,.2);display:block;background:#1a0e05}
.img-thumb-label{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:2px}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox-img{max-width:90vw;max-height:85vh;border-radius:4px;box-shadow:0 0 40px rgba(0,0,0,.8);cursor:default;display:block}
.lightbox-close{position:absolute;top:20px;right:28px;font-size:36px;color:#ccc;cursor:pointer;line-height:1;font-weight:300;z-index:10000;transition:color .2s}
.lightbox-close:hover{color:#fff}
.lightbox-label{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:#d4c4a0;font-size:14px;letter-spacing:4px;pointer-events:none}
.ai-note{margin-top:24px;padding:12px 14px;background:rgba(139,0,0,.08);border-radius:6px;border-left:3px solid #8B0000}
.ai-note p{font-size:11px;color:#5a2a2a;line-height:1.7;margin:0}
.back-top{
  position:fixed;bottom:24px;right:24px;z-index:200;
  width:52px;height:52px;border:none;padding:0;
  background:transparent;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:transform .55s cubic-bezier(.25,.1,.25,1),opacity .4s;
  opacity:.9;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
}
.back-top.show{display:flex}
.back-top:hover{opacity:1;transform:scale(1.1)}
.back-top:active{transform:scale(0.9)}
.back-top.rotated{transform:rotate(-90deg)}
.back-top.rotated:hover{transform:rotate(-90deg) scale(1.1)}
.back-top.rotated:active{transform:rotate(-90deg) scale(0.9)}
@media(max-width:600px){
  .d-oracle{font-size:60px}
  .main-title{font-size:22px;letter-spacing:12px}
  .subtitle{font-size:13px;letter-spacing:4px}
}

/* ===== 拓片识别上传面板 ===== */
.upload-panel{
  margin-top:40px;padding:32px 24px 32px 58px;
  background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
  border:1px solid var(--edge);border-radius:12px;
  animation:fadeUp .6s ease;
  overflow:visible;
  position:relative;
}
.upload-header{text-align:center;margin-bottom:28px}
.upload-header h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:4px;margin-bottom:8px}
.upload-subtitle{font-size:13px;color:var(--muted);letter-spacing:1px}
.upload-body{position:relative}
.upload-main{min-width:0}

/* 青铜鼎二维码挂件（左手边浮动，俯视图）- 写实商代圆鼎 */
.ding-qr{
  position:absolute;left:-150px;top:50%;
  transform:translateY(-50%);
  width:140px;cursor:pointer;
  z-index:10;
  transition:transform .3s ease;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,0.55));
}
.ding-qr:hover{transform:translateY(-50%) scale(1.06)}
.ding-vessel{position:relative;width:140px;height:140px;display:block}
/* 鼎耳（左右各一，环形竖耳，俯视如双拱） */
.ding-handle{
  position:absolute;top:-6px;width:22px;height:30px;z-index:4;
}
.ding-handle::before{
  content:'';position:absolute;left:2px;top:0;right:2px;bottom:6px;
  border:3.5px solid #3a2810;border-bottom:none;
  border-radius:11px 11px 2px 2px;
  background:linear-gradient(180deg,#8a6830 0%,#5a4020 50%,#3a2810 100%);
  box-shadow:inset 0 2px 3px rgba(200,160,80,0.25),0 2px 4px rgba(0,0,0,0.4);
}
.ding-handle::after{
  content:'';position:absolute;left:6px;top:5px;right:6px;bottom:10px;
  border:2px solid transparent;border-bottom:none;
  border-radius:7px 7px 0 0;
  box-shadow:inset 0 0 4px rgba(0,0,0,0.6);
  background:rgba(20,12,5,0.5);
}
.ding-handle.left{left:16px}
.ding-handle.right{right:16px}
/* 鼎身（圆形器身，俯视图，青铜质感） */
.ding-body{
  position:absolute;left:10px;top:10px;width:120px;height:120px;border-radius:50%;
  background:
    radial-gradient(ellipse at 32% 28%,rgba(190,150,80,0.35) 0%,transparent 45%),
    radial-gradient(ellipse at 68% 72%,rgba(50,35,15,0.45) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(120,90,40,0.15) 0%,transparent 70%),
    linear-gradient(150deg,#5a4020 0%,#3a2810 35%,#2a1a08 65%,#1a0f05 100%);
  border:2.5px solid #0a0602;
  box-shadow:
    inset 0 0 18px rgba(0,0,0,0.65),
    inset 0 2px 5px rgba(200,160,80,0.18),
    0 6px 14px rgba(0,0,0,0.55);
}
/* 鼎口沿（厚唇外侈，青铜光泽圆环） */
.ding-rim{
  position:absolute;left:0;top:0;width:140px;height:140px;border-radius:50%;
  background:
    radial-gradient(ellipse at 28% 25%,rgba(220,180,100,0.4) 0%,transparent 38%),
    radial-gradient(ellipse at 72% 75%,rgba(70,45,15,0.5) 0%,transparent 38%),
    linear-gradient(150deg,#d4b060 0%,#a07830 22%,#705020 48%,#4a3010 74%,#2a1808 100%);
  border:3px solid #0a0602;
  box-shadow:
    inset 0 3px 8px rgba(240,200,120,0.28),
    inset 0 -3px 8px rgba(0,0,0,0.45),
    0 2px 5px rgba(0,0,0,0.35);
}
/* 口沿内凹（鼎腹内腔，深邃黑暗） */
.ding-rim::before{
  content:'';position:absolute;left:14px;top:14px;right:14px;bottom:14px;border-radius:50%;
  background:radial-gradient(circle at 45% 42%,#1a1005 0%,#0a0602 55%,#050300 100%);
  box-shadow:inset 0 4px 12px rgba(0,0,0,0.9),inset 0 -1px 4px rgba(100,70,30,0.18);
}
/* 饕餮纹带（口沿下方一圈连续纹饰） */
.ding-rim::after{
  content:'';position:absolute;left:10px;top:10px;right:10px;bottom:10px;border-radius:50%;
  background:
    repeating-conic-gradient(from 0deg,rgba(180,140,70,0.3) 0deg 8deg,transparent 8deg 16deg),
    repeating-conic-gradient(from 4deg,rgba(100,70,30,0.2) 0deg 4deg,transparent 4deg 16deg);
  -webkit-mask:radial-gradient(circle,transparent 62%,black 65%,black 72%,transparent 75%);
  mask:radial-gradient(circle,transparent 62%,black 65%,black 72%,transparent 75%);
  pointer-events:none;
}
/* 鼎足（三足，俯视从器身下伸出，120°分布） */
.ding-leg{
  position:absolute;width:18px;height:28px;z-index:0;
  background:linear-gradient(180deg,#4a3015 0%,#2a1808 50%,#1a0f05 100%);
  border:1.5px solid #0a0602;
  box-shadow:0 3px 6px rgba(0,0,0,0.45),inset 0 1px 2px rgba(180,140,70,0.15);
}
.ding-leg::after{
  content:'';position:absolute;left:3px;right:3px;bottom:0;height:6px;
  background:radial-gradient(ellipse at 50% 100%,#5a4020 0%,#3a2510 60%,transparent 100%);
  border-radius:0 0 50% 50%;
}
.ding-leg.top{left:50%;top:-16px;transform:translateX(-50%) rotate(0deg);border-radius:6px 6px 2px 2px}
.ding-leg.bl{left:4px;bottom:-6px;transform:rotate(-40deg);border-radius:2px 2px 6px 6px}
.ding-leg.br{right:4px;bottom:-6px;transform:rotate(40deg);border-radius:2px 2px 6px 6px}
/* 鼎盖（圆盖，微鼓，中心有钮，青铜质感） */
.ding-lid{
  position:absolute;left:16px;top:16px;width:108px;height:108px;border-radius:50%;
  background:
    radial-gradient(ellipse at 32% 28%,rgba(210,170,90,0.32) 0%,transparent 42%),
    radial-gradient(ellipse at 68% 72%,rgba(55,38,18,0.42) 0%,transparent 42%),
    linear-gradient(150deg,#c8a050 0%,#907030 32%,#604020 62%,#3a2510 100%);
  border:2.5px solid #0a0602;
  box-shadow:
    0 5px 12px rgba(0,0,0,0.55),
    inset 0 2px 6px rgba(220,180,100,0.22),
    inset 0 -2px 6px rgba(0,0,0,0.35);
  transition:transform .55s cubic-bezier(.5,.15,.2,1.1),opacity .35s;
  transform-origin:50% 50%;
  z-index:5;
}
/* 盖面同心圆凸棱（商代青铜器常见装饰） */
.ding-lid::before{
  content:'';position:absolute;left:10px;top:10px;right:10px;bottom:10px;border-radius:50%;
  border:1.5px solid rgba(0,0,0,0.18);
  box-shadow:0 0 0 10px transparent,inset 0 0 3px rgba(0,0,0,0.12);
}
/* 盖面旋纹（四组对称旋涡纹） */
.ding-lid::after{
  content:'';position:absolute;left:18px;top:18px;right:18px;bottom:18px;border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%,rgba(0,0,0,0.12) 0%,transparent 20%),
    radial-gradient(circle at 70% 30%,rgba(0,0,0,0.12) 0%,transparent 20%),
    radial-gradient(circle at 30% 70%,rgba(0,0,0,0.12) 0%,transparent 20%),
    radial-gradient(circle at 70% 70%,rgba(0,0,0,0.12) 0%,transparent 20%);
  pointer-events:none;
}
/* 盖钮（环形捉手，居中，如青铜器盖钮） */
.lid-knob{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#e0c070 0%,#a08040 38%,#604020 75%,#3a2510 100%);
  border:2.5px solid #0a0602;
  z-index:6;
  box-shadow:
    0 3px 5px rgba(0,0,0,0.5),
    inset 0 1px 3px rgba(220,180,100,0.3),
    inset 0 -1px 2px rgba(0,0,0,0.3);
}
/* 盖钮内环（捉手中心凹） */
.lid-knob::after{
  content:'';position:absolute;left:5px;top:5px;right:5px;bottom:5px;border-radius:50%;
  background:radial-gradient(circle at 45% 40%,#8a6830 0%,#5a4020 50%,#3a2510 100%);
  border:1px solid rgba(0,0,0,0.25);
}
.ding-qr.open .ding-lid{
  transform:translateY(-52px) scale(0.88);
  opacity:.85;
}
/* 鼎内二维码（开盖后可见） */
.ding-qr-inner{
  position:absolute;left:28px;top:28px;width:84px;height:84px;border-radius:50%;
  background:#f5edd6;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;opacity:0;
  transition:opacity .4s .12s;
  z-index:2;
  box-shadow:inset 0 0 8px rgba(0,0,0,.3);
}
.ding-qr.open .ding-qr-inner{opacity:1}
.ding-qr-inner canvas{display:block;width:80px!important;height:80px!important}
/* 下方文字提示 */
.ding-label{
  position:absolute;left:50%;top:130px;transform:translateX(-50%);
  font-size:10px;color:var(--muted);white-space:nowrap;
  letter-spacing:1px;text-align:center;line-height:1.3;
  opacity:.8;
}

/* 拖拽上传区 */
.drop-zone{
  border:2px dashed var(--edge);border-radius:10px;
  padding:40px 20px;text-align:center;
  cursor:pointer;transition:all .3s;
  background:rgba(255,255,255,.1);
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--gold);background:rgba(255,255,255,.2);
  transform:scale(1.01);
}
.drop-icon{
  font-size:28px;font-weight:700;color:var(--text);
  font-family:'Noto Serif SC',serif;letter-spacing:4px;margin-bottom:12px;
}
.drop-hint{font-size:14px;color:var(--muted);margin-bottom:8px}
.drop-formats{font-size:11px;color:var(--muted);opacity:.6;margin-bottom:16px}
.upload-btn{
  display:inline-block;padding:10px 28px;
  background:var(--edge);color:#f5edd6;
  border:none;border-radius:6px;font-size:14px;
  cursor:pointer;transition:all .2s;letter-spacing:2px;
}
.upload-btn:hover{background:var(--text);transform:translateY(-1px)}

/* 预览区 */
.preview-area{margin-top:20px;text-align:center}
.preview-list{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:16px}
.preview-item{
  position:relative;width:120px;height:120px;border-radius:8px;
  overflow:hidden;border:2px solid var(--edge);background:#1a0e05;
}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .remove-btn{
  position:absolute;top:4px;right:4px;width:22px;height:22px;
  background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.preview-item .remove-btn:hover{background:rgba(139,0,0,.8)}
.preview-item .file-name{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.6);color:#ccc;font-size:9px;
  padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.analyze-btn{
  padding:12px 36px;background:var(--gold);color:var(--text);
  border:none;border-radius:6px;font-size:15px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:3px;margin:0 8px;
}
.analyze-btn:hover{background:var(--gold-l);transform:translateY(-1px)}
.clear-btn{
  padding:10px 24px;background:transparent;color:var(--muted);
  border:1px solid var(--edge);border-radius:6px;font-size:13px;
  cursor:pointer;transition:all .2s;letter-spacing:2px;
}
.clear-btn:hover{border-color:var(--text);color:var(--text)}

/* 识别结果 */
.result-area{margin-top:24px;animation:fadeUp .5s ease}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.result-header h3{font-size:18px;font-weight:700;color:var(--text);letter-spacing:2px}
.ai-badge{
  display:inline-block;padding:3px 10px;
  background:rgba(139,0,0,.1);color:#8B0000;
  border-radius:4px;font-size:11px;font-weight:600;letter-spacing:1px;
}
.result-content{
  background:rgba(255,255,255,.15);border-radius:8px;
  padding:20px;margin-bottom:16px;line-height:2;font-size:15px;color:var(--text);
}
.result-content .glyph-matches{
  display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;
}
.result-content .glyph-match{
  display:flex;flex-direction:column;align-items:center;
  padding:8px;border-radius:8px;background:rgba(255,255,255,.2);
  cursor:pointer;transition:all .2s;min-width:60px;
}
.result-content .glyph-match:hover{background:rgba(255,255,255,.35);transform:translateY(-2px)}
.result-content .glyph-match .gm-char{font-size:32px;font-weight:900;color:var(--text)}
.result-content .glyph-match .gm-name{font-size:11px;color:var(--muted);margin-top:4px}
.result-content .glyph-match .gm-conf{font-size:10px;color:var(--gold);margin-top:2px}
.result-images{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.result-disclaimer{
  font-size:12px;color:var(--muted);padding:10px 14px;
  background:rgba(139,0,0,.06);border-radius:6px;
  border-left:3px solid rgba(139,0,0,.3);line-height:1.7;
}

/* 二维码侧栏 */
.upload-sidebar{text-align:center}
.qr-section{margin-bottom:20px}
.qr-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:2px;margin-bottom:10px}
.qr-box{
  display:inline-block;padding:8px;background:#fff;
  border-radius:8px;border:2px solid var(--edge);
}
.qr-box canvas{display:block}
.qr-hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;letter-spacing:1px}
.audit-notice{
  padding:12px;background:rgba(139,0,0,.06);
  border-radius:8px;border:1px solid rgba(139,0,0,.15);
  margin-bottom:20px;
}
.audit-icon{font-size:18px;margin-bottom:6px}
.audit-text{font-size:11px;color:var(--muted);line-height:1.6}
.tips-section{text-align:left}
.tips-title{font-size:12px;font-weight:600;color:var(--text);letter-spacing:1px;margin-bottom:8px}
.tips-list{list-style:none;padding:0}
.tips-list li{
  font-size:11px;color:var(--muted);padding:4px 0;
  border-bottom:1px solid rgba(139,110,62,.15);
  line-height:1.5;
}
.tips-list li:last-child{border-bottom:none}
.tips-list li::before{content:'· ';color:var(--edge);font-weight:700}

/* 分析中动画 */
.analyzing{position:relative;pointer-events:none}
.analyzing::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(42,26,10,.5);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.analyze-spinner{
  display:none;text-align:center;padding:30px;
}
.analyze-spinner.show{display:block}
.analyze-spinner .dot{display:inline-block;width:8px;height:8px;background:var(--gold);border-radius:50%;margin:0 4px;animation:bounce .6s infinite alternate}
.analyze-spinner .dot:nth-child(2){animation-delay:.2s}
.analyze-spinner .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-8px);opacity:.3}}

/* PDF 预览标记 */
.pdf-badge{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:24px;font-weight:700;color:var(--gold);
  font-family:'Noto Serif SC',serif;
}

@media(max-width:600px){
  .ding-qr{left:-40px;transform:translateY(-50%) scale(.72)}
  .upload-panel{padding:24px 16px 24px 52px}
}
</style>
</head>

/* ===== 字形缓存（预渲染到离屏Canvas，极大提升性能） ===== */
const GLYPH_CACHE={};
const CACHE_SZ=64;      // 缓存基准尺寸
const CACHE_PAD=8;     // 内边距
const CACHE_TOTAL=CACHE_SZ+CACHE_PAD*2;
// 预渲染的颜色版本：墨黑(dark)、金色(gold)
const CACHE_COLORS={
  dark:'#1a0e05',
  gold:'#e8d5a0'
};

function renderGlyphToCache(ch,color){
  var key=ch+'_'+color;
  if(GLYPH_CACHE[key])return GLYPH_CACHE[key];
  var c=document.createElement('canvas');
  c.width=CACHE_TOTAL;c.height=CACHE_TOTAL;
  var cx=c.getContext('2d');
  cx.strokeStyle=color;cx.fillStyle=color;
  cx.lineCap='butt';cx.lineJoin='miter';cx.miterLimit=3;
  var ox=CACHE_PAD,oy=CACHE_PAD;
  var glyph=G[ch];
  if(glyph){
    for(var i=0;i<glyph.length;i++){
      var s=glyph[i];
      cx.lineWidth=s.w*CACHE_SZ;
      var p=s.p;
      if(s.t==='line'||s.t==='lseq'){
        cx.beginPath();cx.moveTo(ox+p[0][0]*CACHE_SZ,oy+p[0][1]*CACHE_SZ);
        for(var j=1;j<p.length;j++) cx.lineTo(ox+p[j][0]*CACHE_SZ,oy+p[j][1]*CACHE_SZ);
        cx.stroke();
      } else if(s.t==='curve'){
        cx.beginPath();cx.moveTo(ox+p[0][0]*CACHE_SZ,oy+p[0][1]*CACHE_SZ);
        for(var j=1;j<p.length-1;j+=2){
          var cp=p[j],ep=p[j+1]||p[j];
          cx.quadraticCurveTo(ox+cp[0]*CACHE_SZ,oy+cp[1]*CACHE_SZ,ox+ep[0]*CACHE_SZ,oy+ep[1]*CACHE_SZ);
        }
        cx.stroke();
      } else if(s.t==='ellipse'){
        cx.beginPath();
        var ecx=ox+p[0][0]*CACHE_SZ,ecy=oy+p[0][1]*CACHE_SZ,erx=p[1][0]*CACHE_SZ,ery=p[1][1]*CACHE_SZ;
        for(var k=0;k<=10;k++){
          var ea=(k/10)*Math.PI*2;
          var epx=ecx+Math.cos(ea)*erx,epy=ecy+Math.sin(ea)*ery;
          k===0?cx.moveTo(epx,epy):cx.lineTo(epx,epy);
        }
        cx.stroke();
      } else if(s.t==='arc'){
        cx.beginPath();
        var acx=ox+p[0][0]*CACHE_SZ,acy=oy+p[0][1]*CACHE_SZ,arx=p[1][0]*CACHE_SZ,ary=p[1][1]*CACHE_SZ;
        var asteps=Math.max(4,Math.round((p[3]-p[2])/(Math.PI/6)));
        for(var k=0;k<=asteps;k++){
          var aa=p[2]+(k/asteps)*(p[3]-p[2]);
          var apx=acx+Math.cos(aa)*arx,apy=acy+Math.sin(aa)*ary;
          k===0?cx.moveTo(apx,apy):cx.lineTo(apx,apy);
        }
        cx.stroke();
      } else if(s.t==='rect'){
        var x1=p[0][0],y1=p[0][1],rw=p[1][0],rh=p[1][1];
        cx.beginPath();
        cx.moveTo(ox+x1*CACHE_SZ,oy+y1*CACHE_SZ);
        cx.lineTo(ox+(x1+rw)*CACHE_SZ,oy+y1*CACHE_SZ);
        cx.lineTo(ox+(x1+rw)*CACHE_SZ,oy+(y1+rh)*CACHE_SZ);
        cx.lineTo(ox+x1*CACHE_SZ,oy+(y1+rh)*CACHE_SZ);
        cx.closePath();cx.stroke();
      } else if(s.t==='dot'){
        var dx=p[1][0]*CACHE_SZ,dy=p[1][1]*CACHE_SZ;
        cx.beginPath();
        cx.moveTo(ox+p[0][0]*CACHE_SZ-dx,oy+p[0][1]*CACHE_SZ);
        cx.lineTo(ox+p[0][0]*CACHE_SZ,oy+p[0][1]*CACHE_SZ-dy);
        cx.lineTo(ox+p[0][0]*CACHE_SZ+dx,oy+p[0][1]*CACHE_SZ);
        cx.lineTo(ox+p[0][0]*CACHE_SZ,oy+p[0][1]*CACHE_SZ+dy);
        cx.closePath();cx.fill();
      }
    }
  }
  GLYPH_CACHE[key]=c;
  return c;
}

// 预缓存所有字形（墨黑+金色两版）
(function(){
  for(var i=0;i<CHARS.length;i++){
    renderGlyphToCache(CHARS[i],'dark');
    renderGlyphToCache(CHARS[i],'gold');
  }
})();

/* ===== 选择颜色版本 ===== */
function pickCacheColor(color){
  // 解析颜色判断是金色还是墨黑
  if(color[0]==='#'){
    // hex: #f5e8c0 是亮金色
    var r=parseInt(color.substr(1,2),16);
    return r>150?'gold':'dark';
  }
  // rgba(r,g,b,a)
  var m=color.match(/rgba?\((\d+),(\d+),(\d+)/);
  if(m){
    var r=parseInt(m[1]);
    return r>100?'gold':'dark';
  }
  return 'dark';
}

/* ===== 绘制甲骨文字（直接drawImage缓存，最快） ===== */
function drawGlyph(ctx,ch,x,y,sz,color,hover){
  var ver=pickCacheColor(color);
  var c=GLYPH_CACHE[ch+'_'+ver];
  if(!c)c=GLYPH_CACHE[ch+'_dark'];
  if(!c)return;
  var scale=sz/CACHE_SZ;
  var dw=CACHE_TOTAL*scale;
  var dh=CACHE_TOTAL*scale;
  if(dw<1||dh<1)return;
  ctx.save();
  // 从rgba()中提取透明度
  var alpha=1;
  var am=color.match(/rgba?\([^,]+,[^,]+,[^,]+,([^)]+)\)/);
  if(am)alpha=parseFloat(am[1]);
  ctx.globalAlpha=alpha;
  if(hover){
    ctx.shadowColor=ver==='gold'?'rgba(245,232,192,0.7)':'rgba(120,60,20,0.5)';
    ctx.shadowBlur=sz*0.4;
  }
  ctx.drawImage(c,x-dw/2,y-dh/2,dw,dh);
  ctx.restore();
}

/* ===== 墨水扩散 ===== */
function initInk(){
  S.inkPts=[];
  for(var i=0;i<100;i++){
    S.inkPts.push({
      ang:Math.random()*Math.PI*2,curR:S.r,
      maxR:Math.max(window.innerWidth,window.innerHeight)*(0.45+Math.random()*0.3),
      sp:0.3+Math.random()*1,sz:0.8+Math.random()*2.2,
      a:0.05+Math.random()*0.08,life:1
    });
  }
  // 冲击波初始化
  S.shockR=S.r*0.5;S.shockOp=1;
  // 爆裂粒子（金色+墨色飞散）
  S.burstPts=[];
  for(var i=0;i<60;i++){
    var ang=Math.random()*Math.PI*2;
    var spd=2+Math.random()*6;
    S.burstPts.push({
      x:0,y:0,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      sz:1.5+Math.random()*3,
      life:1,
      gold:Math.random()>0.55,
      decay:0.6+Math.random()*0.8
    });
  }
}
function drawInk(){
  var c=C.ink,ctx=X.ink,w=c.width,h=c.height,cx=w/2,cy=h/2+S.sphereOffY;
  ctx.clearRect(0,0,w,h);
  if(!S.inkOn&&S.inkOp<0.01&&S.shockOp<0.01)return;
  // 平滑扩散：dt驱动，指数减速（ease-out）
  if(S.inkSpread){
    var maxE=Math.min(w,h)*0.48; // 进一步缩小扩张尺寸，减少遮挡
    var growRate=(maxE-S.inkR)*3;
    S.inkR+=growRate*S._dt;
    if(S.inkR>maxE*0.98){S.inkR=maxE;S.inkSpread=false;if(!S.expanded){S.expanded=true;updateButtonState();}}
  }
  ctx.save();
  // === 冲击波环（多层，扩散时从中心弹出）===
  if(S.shockOp>0.01){
    var dt60=S._dt*60;
    S.shockR+=(S.r*2.5)*S._dt*2.5;
    S.shockOp=Math.max(0,S.shockOp-dt60*0.015);
    // 三层冲击波
    for(var ring=0;ring<3;ring++){
      var ringR=S.shockR-ring*S.r*0.35;
      if(ringR<S.r*0.3)continue;
      var ringA=S.shockOp*(1-ring*0.25);
      ctx.strokeStyle='rgba(200,170,100,'+ringA*0.6+')';
      ctx.lineWidth=2+ring*1.5;
      ctx.beginPath();ctx.arc(cx,cy,ringR,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(255,240,200,'+ringA*0.3+')';
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.arc(cx,cy,ringR+4,0,Math.PI*2);ctx.stroke();
    }
  }
  // === 爆裂粒子（金墨飞散）===
  if(S.burstPts.length>0){
    var dt60=S._dt*60;
    for(var i=S.burstPts.length-1;i>=0;i--){
      var bp=S.burstPts[i];
      bp.x+=bp.vx*dt60;bp.y+=bp.vy*dt60;
      bp.vy+=0.08*dt60; // 轻微重力
      bp.vx*=Math.pow(0.97,dt60);bp.vy*=Math.pow(0.97,dt60);
      bp.life-=bp.decay*S._dt;
      if(bp.life<=0){S.burstPts.splice(i,1);continue;}
      var ba=bp.life*S.shockOp*1.2;
      if(ba<0.01)continue;
      if(bp.gold){
        ctx.fillStyle='rgba(230,200,120,'+ba+')';
        ctx.shadowColor='rgba(255,220,100,'+ba*0.8+')';ctx.shadowBlur=6;
      }else{
        ctx.fillStyle='rgba(30,18,8,'+ba*0.8+')';
        ctx.shadowBlur=0;
      }
      ctx.beginPath();ctx.arc(cx+bp.x,cy+bp.y,bp.sz*bp.life,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  }
  // 外围虚化：对整个页面施加暗色蒙层，越往外越淡
  var dimA=S.inkOp*0.35;
  if(dimA>0.01){
    var dg=ctx.createRadialGradient(cx,cy,S.inkR*0.7,cx,cy,Math.max(w,h)*0.8);
    dg.addColorStop(0,'rgba(5,3,8,0)');
    dg.addColorStop(0.5,'rgba(10,6,4,'+dimA*0.3+')');
    dg.addColorStop(1,'rgba(20,12,6,'+dimA+')');
    ctx.fillStyle=dg;ctx.fillRect(0,0,w,h);
  }
  var iR=S.inkR*0.88;
  if(iR>S.r*0.3){
    var ig=ctx.createRadialGradient(cx,cy,S.r*0.1,cx,cy,iR);
    ig.addColorStop(0,'rgba(5,4,10,'+S.inkOp+')');
    ig.addColorStop(0.8,'rgba(8,6,12,'+S.inkOp*0.96+')');
    ig.addColorStop(1,'rgba(15,12,20,'+S.inkOp*0.5+')');
    ctx.fillStyle=ig;ctx.beginPath();ctx.arc(cx,cy,iR,0,Math.PI*2);ctx.fill();
  }
  var oR=S.inkR*1.08;
  if(S.inkR>S.r*0.7){
    var edgeA=S.inkOp*Math.min(0.45,(S.inkR-S.r*0.7)/(S.r*0.6));
    var wg=ctx.createRadialGradient(cx,cy,iR,cx,cy,oR);
    wg.addColorStop(0,'rgba(20,15,25,'+edgeA*0.8+')');
    wg.addColorStop(0.5,'rgba(50,38,30,'+edgeA*0.3+')');
    wg.addColorStop(0.8,'rgba(90,72,50,'+edgeA*0.1+')');
    wg.addColorStop(1,'rgba(140,110,70,0)');
    ctx.fillStyle=wg;ctx.beginPath();
    var steps=90;
    for(var i=0;i<=steps;i++){var a=(i/steps)*Math.PI*2;
      var n=Math.sin(a*2+S.t*0.012)*16+Math.sin(a*5-S.t*0.018)*8+Math.sin(a*9+S.t*0.007)*4;
      var r=oR+n,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.fill();
  }
  // === 水墨云纹扩散效果（增强版）===
  if(S.inkR>S.r*0.4){
    var cloudA=S.inkOp*0.5;
    var progress=Math.min(1,(S.inkR-S.r*0.4)/(S.r*0.6));
    // 第一层：内圈浓墨旋涡纹（祥云核心）
    for(var layer=0;layer<5;layer++){
      var layerR=S.inkR*(0.25+layer*0.14);
      var layerA=cloudA*(1-layer*0.18)*progress;
      ctx.save();
      ctx.globalAlpha=layerA;
      ctx.strokeStyle='rgba(35,25,15,'+layerA+')';
      ctx.lineWidth=2.2-layer*0.35;
      ctx.lineJoin='round';
      ctx.beginPath();
      var cloudSteps=80;
      for(var i=0;i<=cloudSteps;i++){
        var a=(i/cloudSteps)*Math.PI*2;
        var wave1=Math.sin(a*2+S.t*0.012+layer*1.3)*14;
        var wave2=Math.sin(a*5-S.t*0.019+layer*2.1)*8;
        var wave3=Math.sin(a*8+S.t*0.007+layer*3.7)*4;
        var wave4=Math.sin(a*13-S.t*0.011+layer*0.8)*2;
        var spiral=Math.sin(a*3+S.t*0.015+layer*0.5)*6*progress;
        var r=layerR+wave1+wave2+wave3+wave4+spiral;
        var x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();ctx.stroke();
      ctx.restore();
    }
    // 第二层：外缘墨韵晕染（水墨渗透渐变）
    if(S.inkR>S.r*0.6){
      var bleedA=cloudA*0.25*progress;
      for(var b=0;b<3;b++){
        var bleedR=S.inkR*(0.85+b*0.12);
        var bleedW=8+b*5;
        ctx.save();
        ctx.globalAlpha=bleedA*(1-b*0.3);
        var bg=ctx.createRadialGradient(cx,cy,bleedR-bleedW,cx,cy,bleedR+bleedW);
        bg.addColorStop(0,'rgba(30,20,12,0)');
        bg.addColorStop(0.4,'rgba(30,20,12,'+bleedA*0.4+')');
        bg.addColorStop(0.6,'rgba(40,28,18,'+bleedA*0.6+')');
        bg.addColorStop(1,'rgba(50,35,22,0)');
        ctx.fillStyle=bg;
        ctx.beginPath();
        var bSteps=72;
        for(var i=0;i<=bSteps;i++){
          var a=(i/bSteps)*Math.PI*2;
          var bw=Math.sin(a*4+S.t*0.01+b*2)*10+Math.sin(a*9-S.t*0.016+b)*5;
          var r=bleedR+bw,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.closePath();ctx.fill();
        ctx.restore();
      }
    }
    // 第三层：飞白效果（干笔拖拽断续墨痕）
    if(S.inkSpread||progress>0.3){
      var fbA=cloudA*0.45;
      for(var i=0;i<12;i++){
        var ang=i*Math.PI*2/12+S.t*0.006;
        var startR=S.inkR*0.5;
        var endR=S.inkR*(0.85+Math.sin(S.t*0.015+i*1.7)*0.1);
        ctx.save();
        ctx.globalAlpha=fbA*(0.3+Math.sin(i*2.3)*0.3);
        ctx.strokeStyle='rgba(25,18,10,'+fbA*0.5+')';
        ctx.lineWidth=1.2+Math.sin(i*3.7)*0.6;
        ctx.setLineDash([3+Math.sin(i*1.1)*2,4+Math.cos(i*2.3)*3]);
        ctx.beginPath();
        for(var j=0;j<=20;j++){
          var t2=j/20;
          var fR=startR+(endR-startR)*t2;
          var fAng=ang+Math.sin(t2*3+i)*0.08;
          var fx=cx+Math.cos(fAng)*fR;
          var fy=cy+Math.sin(fAng)*fR;
          j===0?ctx.moveTo(fx,fy):ctx.lineTo(fx,fy);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }
    // 第四层：墨点飞溅（扩散时墨滴+微溅）
    if(S.inkSpread){
      for(var i=0;i<14;i++){
        var ang=i*Math.PI*2/14+S.t*0.008+Math.sin(i*1.3)*0.3;
        var dist=S.inkR*(0.55+Math.sin(S.t*0.018+i*2.1)*0.15);
        var fx=cx+Math.cos(ang)*dist;
        var fy=cy+Math.sin(ang)*dist;
        var fSize=2+Math.sin(S.t*0.025+i*3)*1.5+Math.sin(i*5)*1;
        var fA=cloudA*(0.3+Math.sin(i*2.7)*0.2);
        ctx.fillStyle='rgba(25,18,10,'+fA+')';
        ctx.beginPath();ctx.arc(fx,fy,Math.max(1,fSize),0,Math.PI*2);ctx.fill();
        if(i%3===0){
          for(var k=0;k<3;k++){
            var sa=ang+Math.sin(k*4+i)*0.5;
            var sd=dist+8+k*5;
            ctx.fillStyle='rgba(30,20,12,'+fA*0.4+')';
            ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sd,cy+Math.sin(sa)*sd,1+Math.sin(k+i)*0.5,0,Math.PI*2);ctx.fill();
          }
        }
      }
    }
    // 第五层：祥云卷须（边缘螺旋卷云纹）
    if(S.inkR>S.r*0.7){
      var tendrilA=cloudA*0.3*progress;
      for(var i=0;i<6;i++){
        var baseAng=i*Math.PI*2/6+S.t*0.005;
        var baseR=S.inkR*0.9;
        ctx.save();
        ctx.globalAlpha=tendrilA*(0.5+Math.sin(i*1.8)*0.3);
        ctx.strokeStyle='rgba(35,25,15,'+tendrilA*0.6+')';
        ctx.lineWidth=1.5;ctx.lineCap='round';
        ctx.beginPath();
        for(var j=0;j<=24;j++){
          var t2=j/24;
          var spiralR=baseR+t2*25;
          var spiralAng=baseAng+t2*Math.PI*0.8+Math.sin(S.t*0.01+i)*0.15;
          var tx=cx+Math.cos(spiralAng)*spiralR;
          var ty=cy+Math.sin(spiralAng)*spiralR;
          j===0?ctx.moveTo(tx,ty):ctx.lineTo(tx,ty);
        }
        ctx.stroke();ctx.restore();
      }
    }
  }
  // 墨水粒子只在扩散过程中活动
  if(S.inkSpread){
    for(var i=0;i<S.inkPts.length;i++){
      var p=S.inkPts[i];
      p.curR+=p.sp*0.7*S._dt*60;
      if(p.curR>p.maxR)p.life-=0.01*S._dt*60;
      if(p.life<=0)continue;
      var dr=(p.curR-S.r)/(p.maxR-S.r);
      var pa=p.a*p.life*S.inkOp*Math.max(0,1-dr);
      if(pa>0.003){
        ctx.fillStyle='rgba(70,55,42,'+pa+')';
        ctx.beginPath();ctx.arc(cx+Math.cos(p.ang)*p.curR,cy+Math.sin(p.ang)*p.curR,p.sz*p.life,0,Math.PI*2);ctx.fill();
      }
    }
  }
  ctx.restore();
}

/* ===== 星空 ===== */
function initStars(){
  S.stars=[];
  var w=window.innerWidth,h=window.innerHeight;
  for(var i=0;i<80;i++){
    var big=Math.random()>0.82;
    S.stars.push({
      x:Math.random()*w,y:Math.random()*h,
      r:big?1.2+Math.random()*0.7:0.3+Math.random()*0.5,
      a:big?0.6+Math.random()*0.3:0.1+Math.random()*0.3,
      tw:!big,ts:0.006+Math.random()*0.02,to:Math.random()*Math.PI*2
    });
  }
}
function drawStars(){
  var c=C.star,ctx=X.star,w=c.width,h=c.height;
  ctx.clearRect(0,0,w,h);
  if(S.inkOp<0.05)return;
  ctx.save();ctx.globalAlpha=S.inkOp;
  for(var i=0;i<S.stars.length;i++){
    var s=S.stars[i];
    var a=s.tw?s.a*(0.2+0.8*Math.pow(Math.sin(S.t*0.05*s.ts+s.to),2)):s.a;
    if(s.r>1){
      var gl=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3);
      gl.addColorStop(0,'rgba(220,215,200,'+a*0.2+')');gl.addColorStop(1,'rgba(220,215,200,0)');
      ctx.fillStyle=gl;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(240,235,220,'+a+')';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

/* ===== 3D球体 ===== */
// 焦距：较短值 = 较强透视感，但不能太短否则文字过大
var FOCAL=340;
function genPts(n){
  var pts=[],g=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<n;i++){
    var y=1-(i/(n-1))*2,r=Math.sqrt(1-y*y),t=g*i;
    pts.push({x:Math.cos(t)*r,y:y,z:Math.sin(t)*r,ci:i%CHARS.length});
  }
  return pts;
}
S.pts=genPts(CHARS.length);

function rot3(p,rx,ry){
  var x1=p.x*Math.cos(ry)-p.z*Math.sin(ry),z1=p.x*Math.sin(ry)+p.z*Math.cos(ry);
  return{x:x1,y:p.y*Math.cos(rx)-z1*Math.sin(rx),z:p.y*Math.sin(rx)+z1*Math.cos(rx)};
}

// 绘制经纬线（线框球体感）
function drawWire(ctx,cx,cy,r,rx,ry,alpha){
  if(alpha<0.01)return;
  ctx.save();
  var wireCol=S.inkOp>0.2?'rgba(200,180,140,'+alpha*0.5+')':'rgba(30,18,8,'+alpha*0.8+')';
  ctx.strokeStyle=wireCol;
  ctx.lineWidth=0.5;
  var wireSteps=24;
  // 纬线（水平圈）- 只画3条
  for(var lat=-45;lat<=45;lat+=45){
    var latR=lat*Math.PI/180;
    var cr=Math.cos(latR);
    ctx.beginPath();
    var started=false;
    var lastPX=0,lastPY=0;
    for(var i=0;i<=wireSteps;i++){
      var a=(i/wireSteps)*Math.PI*2;
      var pt={x:Math.cos(a)*cr,y:Math.sin(latR),z:Math.sin(a)*cr};
      var rp=rot3(pt,rx,ry);
      var zz=rp.z*r;
      var sc2=FOCAL/(FOCAL-zz);
      var px=cx+rp.x*r*sc2,py=cy+rp.y*r*sc2;
      var inFront=rp.z>-0.15;
      if(!inFront){started=false;continue;}
      if(!started||Math.abs(px-lastPX)>80){ctx.moveTo(px,py);started=true;}
      else ctx.lineTo(px,py);
      lastPX=px;lastPY=py;
    }
    ctx.stroke();
  }
  // 经线（垂直圈）- 8条
  for(var lon=0;lon<360;lon+=45){
    var lonR=lon*Math.PI/180;
    ctx.beginPath();
    var started2=false;
    var lpx=0,lpy=0;
    for(var i=0;i<=wireSteps;i++){
      var lat2=-90+(i/wireSteps)*180;
      var latR2=lat2*Math.PI/180;
      var pt2={x:Math.cos(lonR)*Math.cos(latR2),y:Math.sin(latR2),z:Math.sin(lonR)*Math.cos(latR2)};
      var rp2=rot3(pt2,rx,ry);
      if(rp2.z<-0.15){started2=false;continue;}
      var zz2=rp2.z*r;
      var sc3=FOCAL/(FOCAL-zz2);
      var px2=cx+rp2.x*r*sc3,py2=cy+rp2.y*r*sc3;
      if(!started2||Math.abs(px2-lpx)>80){ctx.moveTo(px2,py2);started2=true;}
      else ctx.lineTo(px2,py2);
      lpx=px2;lpy=py2;
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawSphere(){
  var c=C.sphere,ctx=X.sphere,w=c.width,h=c.height;
  if(w<10||h<10)return;
  var cx=w/2,cy=h/2+S.sphereOffY;
  ctx.clearRect(0,0,w,h);

  if(S.r<5)return;

  // === 球体体积感 ===
  // 1. 球体基底（淡暗表示体积，墨染时加深）
  if(S.inkOp>0.05||S.inter>0.05){
    var cg=ctx.createRadialGradient(cx,cy-S.r*0.1,S.r*0.05,cx,cy,S.r);
    cg.addColorStop(0,'rgba(8,6,14,'+(0.25+S.inter*0.5+S.inkOp*0.4)+')');
    cg.addColorStop(0.5,'rgba(15,10,8,'+(0.18+S.inter*0.3+S.inkOp*0.3)+')');
    cg.addColorStop(0.85,'rgba(42,26,10,'+(0.08+S.inter*0.12)+')');
    cg.addColorStop(1,'rgba(42,26,10,0)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,S.r,0,Math.PI*2);ctx.fill();
  } else {
    // 非交互状态：明显的球形阴影，中心略暗
    var cg2=ctx.createRadialGradient(cx-S.r*0.2,cy-S.r*0.25,S.r*0.1,cx,cy,S.r);
    cg2.addColorStop(0,'rgba(42,28,14,0.02)');
    cg2.addColorStop(0.3,'rgba(42,28,14,0.06)');
    cg2.addColorStop(0.6,'rgba(30,20,10,0.12)');
    cg2.addColorStop(0.85,'rgba(20,14,8,0.1)');
    cg2.addColorStop(1,'rgba(42,26,10,0)');
    ctx.fillStyle=cg2;ctx.beginPath();ctx.arc(cx,cy,S.r,0,Math.PI*2);ctx.fill();
  }

  // 2. 边缘暗化（rim shadow）- 增强球体轮廓立体感
  var eg=ctx.createRadialGradient(cx,cy,S.r*0.65,cx,cy,S.r*1.03);
  eg.addColorStop(0,'rgba(0,0,0,0)');
  eg.addColorStop(0.5,'rgba(0,0,0,'+(0.05+S.inter*0.1+S.inkOp*0.08)+')');
  eg.addColorStop(0.85,'rgba(0,0,0,'+(0.12+S.inter*0.18+S.inkOp*0.15)+')');
  eg.addColorStop(1,'rgba(0,0,0,'+(0.2+S.inter*0.2+S.inkOp*0.15)+')');
  ctx.fillStyle=eg;ctx.beginPath();ctx.arc(cx,cy,S.r*1.03,0,Math.PI*2);ctx.fill();

  // 3. 高光（左上）
  if(!S.mini){
    var hg=ctx.createRadialGradient(cx-S.r*0.35,cy-S.r*0.4,0,cx-S.r*0.35,cy-S.r*0.4,S.r*0.6);
    hg.addColorStop(0,'rgba(240,220,170,'+(0.12+S.inter*0.08+S.inkOp*0.05)+')');
    hg.addColorStop(0.3,'rgba(240,220,170,'+(0.05+S.inter*0.03)+')');
    hg.addColorStop(1,'rgba(240,220,170,0)');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,S.r,0,Math.PI*2);ctx.fill();
  }

  // 4. 轮廓线
  ctx.strokeStyle='rgba(30,18,8,'+(0.2+S.inter*0.15+S.inkOp*0.2)+')';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(cx,cy,S.r,0,Math.PI*2);ctx.stroke();

  // 5. 经纬线（帮助感知球体曲面）
  var wireA=S.mini?0.05:(0.08+S.inter*0.15+S.inkOp*0.06);
  drawWire(ctx,cx,cy,S.r*0.99,S.rx,S.ry,wireA);

  // === 计算投影并绘制文字 ===
  var list=[];
  for(var i=0;i<S.pts.length;i++){
    var pt=S.pts[i];
    var rp=rot3(pt,S.rx,S.ry);
    var zz=rp.z*S.r;
    var scale=FOCAL/(FOCAL-zz);
    list.push({
      x:cx+rp.x*S.r*scale,
      y:cy+rp.y*S.r*scale,
      s:scale,z:rp.z,
      ch:CHARS[pt.ci]
    });
  }
  // 按z排序：背面先画，前面后画
  list.sort(function(a,b){return a.z-b.z;});

  for(var i=0;i<list.length;i++){
    var it=list[i];
    var isH=(it.ch===S.hov&&it.z>0.1);
    // 前面的字更大，后面更小（透视效果）
    var fs=isH?S.csz*it.s*1.6:S.csz*it.s;
    // 跳过太小的字（性能优化，阈值设低避免跳变闪动）
    if(fs<1.5&&!isH)continue;
    var a;
    // 基于z值的透明度：前面亮，后面暗（提高最小值避免球内太空）
    if(it.z>0.85)a=0.95;
    else if(it.z>0.5)a=0.75+(it.z-0.5)*0.7;
    else if(it.z>0.1)a=0.5+(it.z-0.1)*0.6;
    else if(it.z>-0.3)a=0.3+(it.z+0.3)*0.5;
    else if(it.z>-0.6)a=0.15+(it.z+0.6)*0.5;
    else a=0.1;
    if(isH)a=1;
    // 跳过几乎看不见的字（阈值低避免闪跳）
    if(a<0.015&&!isH)continue;

    // 颜色：墨染时金色，平时深色（近墨黑）。使用平滑过渡避免闪跳
    var useGold=S.inkOp>0.15 ? Math.min(1,(S.inkOp-0.15)/0.2) : 0;
    var col;
    if(useGold>0.02&&it.z>-0.2){
      // 墨染状态：根据inkOp平滑过渡到金色
      var gR=Math.round(20+(232-20)*useGold),gG=Math.round(12+(213-12)*useGold),gB=Math.round(5+(160-5)*useGold);
      col=isH?'#f5e8c0':'rgba('+gR+','+gG+','+gB+','+a+')';
    } else {
      col=isH?'rgba(80,10,0,'+a+')':'rgba(20,12,5,'+a+')';
    }

    // 基于z连续计算大小（透视已通过scale处理，这里只做温和的深度增强）
    var zFactor=(it.z+1)/2; // 0~1
    var szFactor=0.7+zFactor*0.3; // 0.7~1.0
    ctx.save();
    ctx.globalAlpha=a;
    drawGlyph(ctx,it.ch,it.x,it.y,fs*szFactor,col,isH);
    ctx.restore();
  }
}

/* ===== 工具函数 ===== */
function hexToRgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
// 确定性伪随机（0-1），基于种子s，避免每帧Math.random()闪烁
function prand(s){
  s=Math.sin(s*78.233+12.9898)*43758.5453;
  return s-Math.floor(s);
}

  '王':function(c,p,cx,cy){

  '卜':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);c.save();c.globalAlpha=a;
    // 甲骨占卜：龟甲碎片、钻凿坑、灼烧焦痕、兆纹蔓延（卜字即兆纹之形）
    var burnX=cx,burnY=cy-5;
    // 龟甲碎片背景（骨黄色，带甲片轮廓）
    var boneG=c.createRadialGradient(burnX,burnY,10,burnX,burnY,70);
    boneG.addColorStop(0,'rgba(200,175,130,'+a*0.35+')');
    boneG.addColorStop(0.7,'rgba(180,155,105,'+a*0.2+')');
    boneG.addColorStop(1,'rgba(180,155,105,0)');
    c.fillStyle=boneG;
    c.beginPath();
    c.moveTo(cx-65,cy+35);c.quadraticCurveTo(cx-70,cy-5,cx-50,cy-45-p*5);
    c.quadraticCurveTo(cx-20,cy-60-p*10,cx,cy-55-p*8);
    c.quadraticCurveTo(cx+30,cy-50-p*5,cx+55,cy-30-p*3);
    c.quadraticCurveTo(cx+70,cy+0,cx+60,cy+35);c.closePath();c.fill();
    // 甲片纹理线（盾纹沟）
    c.strokeStyle='rgba(140,110,65,'+a*0.2+')';c.lineWidth=0.8;
    c.beginPath();c.moveTo(cx-50,cy-30);c.quadraticCurveTo(cx-20,cy-38,cx+10,cy-35);
    c.quadraticCurveTo(cx+40,cy-28,cx+50,cy-15);c.stroke();
    c.beginPath();c.moveTo(cx-55,cy+0);c.quadraticCurveTo(cx-20,cy-5,cx+15,cy-2);
    c.quadraticCurveTo(cx+40,cy+3,cx+55,cy+10);c.stroke();
    // 钻凿坑（椭圆形凿痕，灼烧处，焦黑）
    // 先画墨烟焦痕晕染（以灼烧点为中心的焦黑圈）
    if(p>0.1){
      var charGrow=Math.min(1,(p-0.1)*2);
      var charG=c.createRadialGradient(burnX,burnY,1,burnX,burnY,18+p*8);
      charG.addColorStop(0,'rgba(20,10,3,'+a*0.85*charGrow+')');
      charG.addColorStop(0.4,'rgba(35,20,8,'+a*0.6*charGrow+')');
      charG.addColorStop(0.8,'rgba(60,40,20,'+a*0.25*charGrow+')');
      charG.addColorStop(1,'rgba(80,55,25,0)');
      c.fillStyle=charG;c.beginPath();c.arc(burnX,burnY,18+p*8,0,Math.PI*2);c.fill();
      // 钻凿椭圆坑（梭形凿痕）
      c.fillStyle='rgba(15,8,2,'+a*0.9*charGrow+')';
      c.beginPath();c.ellipse(burnX,burnY,5+p*1.5,8+p*2,0,0,Math.PI*2);c.fill();
      c.strokeStyle='rgba(10,5,0,'+a*0.7+')';c.lineWidth=1;
      c.beginPath();c.ellipse(burnX,burnY,5+p*1.5,8+p*2,0,0,Math.PI*2);c.stroke();
    }
    // 灼烧裂纹（兆纹）- 卜字本身就是兆纹：竖画（墨干）+斜画（墨枝）
    if(p>0.2){
      var crackGrow=Math.min(1,(p-0.2)*2.2);
      // 主竖裂纹（干，自上而下贯穿）：从凿坑向下延伸
      c.strokeStyle='rgba(15,8,2,'+a*0.85+')';c.lineWidth=2.5;c.lineCap='round';c.lineJoin='round';
      var vLen=55*crackGrow;
      c.beginPath();c.moveTo(burnX,burnY+5);
      // 裂纹带锯齿顿挫感（非直线，模拟骨甲裂纹的不规则）
      c.lineTo(burnX-1,burnY+15*crackGrow);
      c.lineTo(burnX+1,burnY+30*crackGrow);
      c.lineTo(burnX-0.5,burnY+45*crackGrow);
      c.lineTo(burnX,burnY+vLen);c.stroke();
      // 斜裂纹（枝，向右上方斜出）：从凿坑斜向右上
      c.lineWidth=2;
      var hLen=45*crackGrow;
      c.beginPath();c.moveTo(burnX,burnY);
      c.quadraticCurveTo(burnX+10*crackGrow,burnY-8*crackGrow,burnX+25*crackGrow,burnY-20*crackGrow);
      c.lineTo(burnX+hLen*0.9,burnY-hLen*0.7);c.stroke();
      // 裂纹小支（兆纹分叉，如树枝状散开）
      c.strokeStyle='rgba(20,10,5,'+a*0.5+')';c.lineWidth=0.8;
      // 预设支脉位置（不用随机避免闪烁）
      var branches=[
        // 竖干上的小支
        [0,15,-8,8],[0,15,6,6],[0,30,-10,5],[0,30,8,9],[0,45,-6,4],
        // 斜枝上的小支
        [15,-12,5,-10],[15,-12,-5,-6],[30,-22,8,-8],[30,-22,-4,-12]
      ];
      for(var bi=0;bi<branches.length;bi++){
        var br=branches[bi];
        var brGrow=Math.min(1,crackGrow*1.5-bi*0.05);
        if(brGrow<=0)continue;
        c.beginPath();
        c.moveTo(burnX+br[0]*crackGrow,burnY+br[1]*crackGrow);
        c.lineTo(burnX+(br[0]+br[2])*crackGrow+Math.sin(p*3+bi)*0.5,
                 burnY+(br[1]+br[3])*crackGrow+Math.cos(p*3+bi)*0.5);
        c.stroke();
      }
    }
    // 灼烧轻烟（袅袅一缕，非烈火，符合甲骨灼烧实况）
    if(p>0.5){
      var smokeA=Math.min(1,(p-0.5)*2)*a;
      for(var si=0;si<5;si++){
        var st=p*80-si*18;
        var sY=burnY-18-st%80;
        if(sY<burnY-70)continue;
        var sA=smokeA*(0.15+Math.sin(p*2+si)*0.08)*(1-(burnY-18-sY)/70);
        c.fillStyle='rgba(60,45,25,'+sA+')';
        c.beginPath();c.arc(burnX+Math.sin(p*2+si)*4+Math.sin(si)*3,sY,4+si*0.8,0,Math.PI*2);c.fill();
      }
    }
    c.restore();
  },
  '田':function(c,p,cx,cy){

  '龙':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);c.save();c.globalAlpha=a;
    // 墨龙：以书入画，几笔浓墨写形，留白为云，不堆砌
    c.lineCap='round';c.lineJoin='round';
    var wig=Math.sin(p*2)*3;

      s.push({x:cx-55+t*110,y:cy+10-Math.sin(t*Math.PI*1.2+p*2.5)*25-t*35+Math.sin(t*Math.PI*2.5+p*2)*5+wig});
    }

    for(var i=1;i<s.length-1;i++){
      c.quadraticCurveTo(s[i].x,s[i].y-5,(s[i].x+s[i+1].x)/2,(s[i].y+s[i+1].y)/2-4);
    }

    c.beginPath();c.ellipse(cx-1,topY,3,5,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx-1,botY,3,5,0,0,Math.PI*2);c.fill();
    // 弓把缠丝（驸部斜纹）
    c.strokeStyle='rgba(40,28,12,'+a*0.6+')';c.lineWidth=1;
    for(var wi=0;wi<7;wi++){
      var wy=cy-8+wi*2.5;
      c.beginPath();c.moveTo(cx+bowBelly+bendAdd-3,wy);c.lineTo(cx+bowBelly+bendAdd+1,wy+1.5);c.stroke();
    }
    // 弦振动
    var vib=0;
    if(release>0){
      vib=Math.sin(release*Math.PI*6)*10*(1-release);
    }
    // 弦（丝弦，从上下弰连到拉点/静止点）
    var restMidX=cx-bowBelly; // 弦静止时中点x
    var midX=release<0.05?stringMidX:(restMidX+vib);
    c.strokeStyle='rgba(25,15,5,'+a*0.7+')';c.lineWidth=1;c.lineCap='round';
    c.beginPath();
    c.moveTo(cx,topY);
    c.lineTo(midX,cy);
    c.lineTo(cx,botY);
    c.stroke();
    // 箭（搭在弦上，水平向右）
    var arrowX,arrowY;
    var arrowLen=26;
    if(release<0.02){
      // 箭在弦上：箭尾在弦拉点，箭头朝右
      arrowX=midX+arrowLen*0.5;arrowY=cy;
    }else{
      // 箭射出向右飞
      var flyDist=release*180;
      arrowX=restMidX+arrowLen*0.5+flyDist;
      arrowY=cy+Math.sin(release*Math.PI*2)*2;
    }
    // 箭杆
    var arrowAng=release<0.02?0:Math.sin(release*Math.PI)*0.04;
    c.save();c.translate(arrowX,arrowY);c.rotate(arrowAng);
    c.strokeStyle='rgba(60,42,18,'+a*0.85+')';c.lineWidth=2;c.lineCap='round';
    c.beginPath();c.moveTo(-arrowLen*0.6,0);c.lineTo(arrowLen*0.4,0);c.stroke();
    // 箭镞（三角尖）
    c.fillStyle='rgba(25,15,5,'+a*0.85+')';
    c.beginPath();c.moveTo(arrowLen*0.4,0);c.lineTo(arrowLen*0.4+7,-2.5);c.lineTo(arrowLen*0.4+7,2.5);c.closePath();c.fill();
    // 箭羽（尾羽两片）
    c.strokeStyle='rgba(40,28,12,'+a*0.55+')';c.lineWidth=1;
    c.beginPath();c.moveTo(-arrowLen*0.6,0);c.lineTo(-arrowLen*0.6-6,-3);c.stroke();
    c.beginPath();c.moveTo(-arrowLen*0.6,0);c.lineTo(-arrowLen*0.6-6,3);c.stroke();
    c.restore();
    // 箭飞行风线
    if(release>0.08&&release<0.75){
      var wA=(1-Math.abs(release-0.35)*2.8)*a;
      c.strokeStyle='rgba(80,60,30,'+wA*0.25+')';c.lineWidth=0.8;
      for(var wi2=0;wi2<3;wi2++){
        var wx2=arrowX-arrowLen*0.4-wi2*12-release*15;
        c.beginPath();c.moveTo(wx2,arrowY-1+wi2);c.lineTo(wx2-15-wi2*5,arrowY-1+wi2);c.stroke();
      }
    }
    c.restore();
  },
  '戈':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);
    if(a<0.02)return;
    c.save();c.globalAlpha=a;
    c.lineCap='round';c.lineJoin='round';
    // 青铜戈横扫：长柲竖直、援横向伸出、胡下垂、内后出，带刀气
    // 挥砍轨迹：从举过顶(约-60°)到向前劈落(约+20°)
    var swing=(-1.1+p*Math.PI*0.75); // 起始~-63°，结束~+72°
    c.save();
    c.translate(cx,cy);
    c.rotate(swing);
    // 戈柲（长柄，纵向），援在柄中上部横向伸出
    var handleTop=-90-p*20,handleBot=70+p*15;
    // 柲（木柄+缠缑，浓墨双线）
    var hG=c.createLinearGradient(-4,handleTop,4,handleBot);
    hG.addColorStop(0,'rgba(80,55,20,0.85)');hG.addColorStop(0.5,'rgba(110,75,30,0.8)');hG.addColorStop(1,'rgba(70,45,18,0.85)');
    c.strokeStyle=hG;c.lineWidth=5+p*1.5;
    c.beginPath();c.moveTo(0,handleTop);c.lineTo(0,handleBot);c.stroke();
    // 缠缑（柄上绑绳X纹）
    c.strokeStyle='rgba(50,32,10,0.55)';c.lineWidth=1;
    for(var i=0;i<9;i++){
      var wy=handleTop+25+i*12;
      c.beginPath();c.moveTo(-3.5,wy);c.lineTo(3.5,wy+5);c.stroke();
      c.beginPath();c.moveTo(3.5,wy);c.lineTo(-3.5,wy+5);c.stroke();
    }
    // 戈援（主刃横向向右，三角形宽刃，尖锋）
    // 援根部在(0,0)，尖在(bladeLen,0)
    var bladeLen=55+p*18;
    var bG=c.createLinearGradient(0,-10,bladeLen,10);
    bG.addColorStop(0,'rgba(140,125,80,0.92)');
    bG.addColorStop(0.3,'rgba(210,195,150,0.95)');
    bG.addColorStop(0.7,'rgba(160,148,100,0.9)');
    bG.addColorStop(1,'rgba(110,98,60,0.88)');
    c.fillStyle=bG;c.strokeStyle='rgba(55,45,20,0.85)';c.lineWidth=1.5;
    c.beginPath();
    c.moveTo(0,-7);                       // 援上阑
    c.lineTo(bladeLen-14,-12-p*2);        // 援上刃起弧
    c.quadraticCurveTo(bladeLen,-3,bladeLen-2,0); // 前锋（尖）
    c.quadraticCurveTo(bladeLen,3,bladeLen-14,9+p*2); // 援下刃弧
    c.lineTo(0,5);                       // 援下阑
    c.closePath();c.fill();c.stroke();
    // 刃锋高光（上缘一道亮线）
    c.strokeStyle='rgba(255,248,225,'+(0.55+Math.sin(p*7)*0.25)+')';c.lineWidth=1.5;
    c.beginPath();c.moveTo(4,-7);c.quadraticCurveTo(bladeLen*0.5,-10-p*2,bladeLen-8,-5);c.stroke();
    // 援脊中线
    c.strokeStyle='rgba(100,88,55,0.5)';c.lineWidth=0.8;
    c.beginPath();c.moveTo(5,-1);c.lineTo(bladeLen-10,-1);c.stroke();
    // 戈胡（从援根向下垂的刃，用于勾啄、穿绳固柲）
    c.fillStyle=bG;c.strokeStyle='rgba(55,45,20,0.85)';c.lineWidth=1.2;
    c.beginPath();
    c.moveTo(-3,5);
    c.lineTo(-3,26+p*6);
    c.quadraticCurveTo(-8,30+p*8,-12,24+p*6);
    c.lineTo(-8,3);
    c.closePath();c.fill();c.stroke();
    // 胡上二穿（绳孔）
    c.fillStyle='rgba(25,18,5,0.85)';
    c.beginPath();c.arc(-5,12+p*2,1.8,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(-6,20+p*4,1.8,0,Math.PI*2);c.fill();
    // 阑（援根凸起，隔档）
    c.strokeStyle='rgba(40,30,12,0.8)';c.lineWidth=2;
    c.beginPath();c.moveTo(-4,-10);c.lineTo(-4,30+p*7);c.stroke();
    // 戈内（援根向左伸出的短榫，用于穿绳固定）
    c.fillStyle='rgba(135,120,80,0.88)';c.strokeStyle='rgba(55,45,20,0.75)';c.lineWidth=1.2;
    c.beginPath();c.rect(-24-p*4,-5,20,10);c.fill();c.stroke();
    // 内上一穿
    c.fillStyle='rgba(25,18,5,0.8)';
    c.beginPath();c.arc(-16-p*2,0,2.2,0,Math.PI*2);c.fill();
    // 内端齿饰
    c.strokeStyle='rgba(80,68,40,0.5)';c.lineWidth=0.8;
    c.beginPath();c.rect(-22-p*4,-3,5,6);c.stroke();
    // 樽（柄底端金属套）
    c.fillStyle='rgba(130,115,75,0.9)';c.strokeStyle='rgba(55,45,20,0.7)';c.lineWidth=1;
    c.beginPath();c.moveTo(-4,handleBot);c.lineTo(-3,handleBot+10);c.lineTo(3,handleBot+10);c.lineTo(4,handleBot);c.closePath();c.fill();c.stroke();
    // 柄顶帽
    c.beginPath();c.arc(0,handleTop,4,0,Math.PI*2);c.fill();
    c.restore();
    // 挥砍刀气（弧形风线）
    c.save();c.translate(cx,cy);c.rotate(swing+0.25);
    for(var i=0;i<4;i++){
      var arcA=a*(0.28-i*0.06);
      if(arcA<0.02)continue;
      c.strokeStyle='rgba(210,190,140,'+arcA+')';c.lineWidth=2.2-i*0.4;
      c.beginPath();
      var arcR=bladeLen+28+i*22;
      c.arc(0,0,arcR,-Math.PI*0.32,-Math.PI*0.02);c.stroke();
    }
    c.restore();
    // 尘土/火星
    if(p>0.45){
      var dustA=Math.min(1,(p-0.45)*2.4)*a;
      for(var i=0;i<8;i++){
        var dang=Math.PI*0.7+prand(i*67+1)*0.4+p*0.4;
        var dr=50+p*80+prand(i*67+2)*30;
        c.fillStyle='rgba(130,100,55,'+dustA*(0.12+prand(i*67+3)*0.1)+')';
        c.beginPath();c.arc(cx+Math.cos(dang)*dr,cy+Math.sin(dang)*dr,1+prand(i*67+4)*1.5,0,Math.PI*2);c.fill();
      }
    }
    c.restore();
  },
  '舟':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);c.save();c.globalAlpha=a;
    // 国画扁舟：一叶渔舟，渔翁戴笠垂钓，江波淡墨，芦荻点缀
    var bY=cy+20,rock=Math.sin(p*2)*1.5; // 船随波微摇

      c.quadraticCurveTo(cx-65,cy-50-p*5,cx-40,cy-35);
      c.quadraticCurveTo(cx-20,cy-55-p*8,cx,cy-40);
      c.quadraticCurveTo(cx+25,cy-60-p*10,cx+50,cy-35);

      c.quadraticCurveTo(cx-15,cy-42-p*5,cx,cy-32);
      c.quadraticCurveTo(cx+30,cy-45-p*6,cx+55,cy-28);
      c.quadraticCurveTo(cx+72,cy-38-p*4,cx+85,cy-20);c.fill();
    }
    // 江水（淡墨留白，勾水纹+染水）

    c.fillRect(cx-90,bY-10,180,50);

    c.strokeStyle='rgba(50,60,65,'+a*0.25+')';c.lineWidth=0.8;c.lineCap='round';
    for(var wi=0;wi<6;wi++){

        var wave=Math.sin((x+p*60)*0.04+wi)*2;
        c.moveTo(x,wY+wave);
        c.quadraticCurveTo(x+3,wY-2+wave,x+6,wY+wave);
        c.quadraticCurveTo(x+9,wY+2+wave,x+12,wY+wave);

    c.save();c.translate(cx,bY);c.rotate(rock*0.02);
    // 船底/船舷外轮廓
    var hullG=c.createLinearGradient(0,-8,0,5);
    hullG.addColorStop(0,'rgba(80,55,25,'+a*0.7+')');
    hullG.addColorStop(1,'rgba(50,35,15,'+a*0.85+')');
    c.fillStyle=hullG;
    c.beginPath();
    c.moveTo(-55,0);
    c.quadraticCurveTo(-62,-10,-45,-12-p*3); // 船头（右）
    c.lineTo(45,-12-p*3);
    c.quadraticCurveTo(62,-10,55,0); // 船尾（左）
    c.lineTo(-55,0);c.closePath();c.fill();
    c.strokeStyle='rgba(35,22,8,'+a*0.8+')';c.lineWidth=1.5;c.stroke();
    // 船内舱板（隔舱）
    c.strokeStyle='rgba(40,28,12,'+a*0.5+')';c.lineWidth=1;
    c.beginPath();c.moveTo(-25,-12-p*3);c.lineTo(-25,-2);c.stroke();
    c.beginPath();c.moveTo(20,-12-p*3);c.lineTo(20,-2);c.stroke();
    // 船头小甲板（站/坐人的地方）
    c.fillStyle='rgba(60,40,15,'+a*0.4+')';
    c.beginPath();c.rect(-45,-10-p*3,15,5);c.fill();
    c.strokeStyle='rgba(35,22,8,'+a*0.4+')';c.lineWidth=0.8;c.stroke();
    // 船尾甲板
    c.beginPath();c.rect(30,-10-p*3,15,5);c.fill();c.stroke();

    c.fillStyle='rgba(50,35,15,'+a*0.6+')';
    c.beginPath();
    c.moveTo(-22,-12-p*3);
    c.quadraticCurveTo(-5,-22-p*5,18,-12-p*3);c.closePath();c.fill();
    c.strokeStyle='rgba(30,20,8,'+a*0.7+')';c.lineWidth=1.2;c.stroke();
    // 篷顶竹节纹
    c.strokeStyle='rgba(35,22,8,'+a*0.35+')';c.lineWidth=0.6;
    for(var bi=-18;bi<16;bi+=6){
      c.beginPath();c.moveTo(bi,-12-p*3-Math.sin((bi+22)*0.2)*7);c.lineTo(bi+3,-12-p*3);c.stroke();
    }
    // 渔翁（坐于船头，戴斗笠，持竿垂钓）
    var fX=-35,fY=-15-p*3;

    c.strokeStyle='rgba(25,15,5,'+a*0.7+')';c.lineWidth=1;c.stroke();
    // 笠顶
    c.beginPath();c.moveTo(fX-3,fY-6);c.quadraticCurveTo(fX,fY-9,fX+3,fY-6);c.stroke();
    // 身躯（简笔：背微驼，披着蓑衣）
    c.fillStyle='rgba(50,35,15,'+a*0.55+')';
    c.beginPath();
    c.moveTo(fX-7,fY);c.quadraticCurveTo(fX-10,fY+10,fX-5,fY+14);
    c.lineTo(fX+5,fY+14);c.quadraticCurveTo(fX+8,fY+5,fX+7,fY);c.closePath();c.fill();
    c.strokeStyle='rgba(30,20,8,'+a*0.5+')';c.lineWidth=1;c.stroke();
    // 蓑衣草纹（散笔）

    c.strokeStyle='rgba(60,42,15,'+a*0.7+')';c.lineWidth=1;
    c.beginPath();c.moveTo(fX+20,fY-3);

    c.strokeStyle='rgba(30,20,8,'+a*0.5+')';c.lineWidth=0.5;
    c.beginPath();c.moveTo(fX+60,fY-5+rodBend);
    c.quadraticCurveTo(fX+62+lineSwing,fY+15,fX+58+lineSwing*0.5,bY+5);c.stroke();
    // 水面鱼漂/钓点小涟漪

      c.strokeStyle='rgba(50,60,65,'+ripA*0.3+')';c.lineWidth=0.6;
      for(var ri=0;ri<2;ri++){
        c.beginPath();c.arc(fX+58+lineSwing*0.5,bY+5,3+ri*3+p*2,0,Math.PI*2);c.stroke();

  },
  '风':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);
    if(a<0.02)return;
    c.save();c.globalAlpha=a;
    c.lineCap='round';c.lineJoin='round';
    // 风：纯以流动卷曲线条表现，参考国画"吴带当风"与十八描
    // 主风带（3-4条长卷曲线，从左向右席卷，有S形卷头）
    var streams=[
      {y:-35,amp:18,len:170,width:2.8,alpha:0.75,speed:1.0},
      {y:-8,amp:14,len:180,width:2.2,alpha:0.6,speed:1.2},
      {y:20,amp:16,len:160,width:2.5,alpha:0.65,speed:0.9},
      {y:45,amp:10,len:140,width:1.8,alpha:0.4,speed:1.1}
    ];
    for(var si=0;si<streams.length;si++){
      var s=streams[si];
      var off=p*80*s.speed;
      c.strokeStyle='rgba(140,165,180,'+a*s.alpha+')';
      c.lineWidth=s.width;
      // 画卷曲线：从左起，向右延伸，右端卷成C形涡卷
      var startX=cx-90+off%(80);
      c.beginPath();
      c.moveTo(startX,cy+s.y);
      // 中间主段：波浪形流动
      for(var t=0;t<=1;t+=0.1){
        var x=startX+t*s.len;
        var y=cy+s.y+Math.sin(t*Math.PI*2+p*4*s.speed+si)*s.amp*0.6;
        c.lineTo(x,y);
      }
      // 末端卷涡：螺旋收笔
      var endX=startX+s.len,endY=cy+s.y+Math.sin(Math.PI*2+p*4*s.speed+si)*s.amp*0.6;

  '鸟':function(c,p,cx,cy){

  '鱼':function(c,p,cx,cy){

  '大':function(c,p,cx,cy){

  '雪':function(c,p,cx,cy){

    }
    // 贝光（左侧高光，温润宝光）

    c.beginPath();c.moveTo(cx-10,bY-22);

    // 串贝暗示（上下两枚小贝，暗示串贝货币）
    if(p>0.3){

  },
  '齿':function(c,p,cx,cy){

    c.lineCap='round';c.lineJoin='round';

    var jawOpen=10+p*15; // 下颌开合度

    c.quadraticCurveTo(cx+35,cy-15,cx+32,cy-5);

    c.quadraticCurveTo(cx-35,cy+20+jawOpen,cx-15,cy+25+jawOpen);
    c.quadraticCurveTo(cx,cy+28+jawOpen,cx+15,cy+25+jawOpen);
    c.quadraticCurveTo(cx+35,cy+20+jawOpen,cx+30,cy+10+jawOpen);
    c.quadraticCurveTo(cx,cy+15+jawOpen*0.5,cx-30,cy+10+jawOpen);c.closePath();c.fill();c.stroke();
    // 上排牙齿（6颗，门齿+犬齿+臼齿）

      var tx=cx-22+i*9;

      var th=8+Math.abs(i-2.5)*1.5; // 犬齿稍长
      c.beginPath();
      c.moveTo(tx,cy-6);
      c.lineTo(tx-tw,cy-6+th);
      c.lineTo(tx+tw,cy-6+th);
      c.closePath();c.fill();c.stroke();

    // 下排牙齿（6颗，与上排交错）
    for(var i=0;i<6;i++){
      var tx=cx-20+i*8;
      var tw=2.5+Math.abs(i-2.5)*0.4;
      var th=7+Math.abs(i-2.5)*1.2;
      c.beginPath();
      c.moveTo(tx,cy+12+jawOpen);
      c.lineTo(tx-tw,cy+12+jawOpen-th);
      c.lineTo(tx+tw,cy+12+jawOpen-th);
      c.closePath();c.fill();c.stroke();

    // 舌（口腔内红色）
    c.fillStyle='rgba(180,60,50,'+a*0.5+')';
    c.beginPath();

    c.beginPath();c.moveTo(cx-6,cy+5+jawOpen*0.3);c.lineTo(cx+6,cy+5+jawOpen*0.3);c.stroke();
    // 口角（两侧深色）
    c.fillStyle='rgba(40,15,10,'+a*0.4+')';
    c.beginPath();c.ellipse(cx-32,cy+2,3,5,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx+32,cy+2,3,5,0,0,Math.PI*2);c.fill();
    c.restore();
  },
  '又':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);
    if(a<0.02)return;
    c.save();c.globalAlpha=a;
    c.lineCap='round';c.lineJoin='round';
    // 写意右手：侧伸三指，掌心纹理，抓握动态
    // 参考国画手：墨块塑掌、细笔勾指、关节分明
    var grasp=Math.sin(p*4)*0.15; // 抓握微动
    // 手掌（侧视，厚实肉感）
    var palmG=c.createRadialGradient(cx-10,cy,3,cx-5,cy,25);
    palmG.addColorStop(0,'rgba(180,140,90,'+a*0.7+')');
    palmG.addColorStop(0.6,'rgba(140,100,60,'+a*0.6+')');
    palmG.addColorStop(1,'rgba(100,70,40,'+a*0.45+')');
    c.fillStyle=palmG;
    c.strokeStyle='rgba(50,32,15,'+a*0.8+')';c.lineWidth=1.5;
    c.beginPath();
    c.moveTo(cx-28,cy+18); // 腕底
    c.quadraticCurveTo(cx-35,cy+5,cx-30,cy-10); // 腕侧
    c.quadraticCurveTo(cx-25,cy-18,cx-15,cy-20-p*2); // 掌根
    c.quadraticCurveTo(cx,cy-22-p*3,cx+8,cy-18-p*4); // 掌指关节
    c.quadraticCurveTo(cx+15,cy-12,cx+12,cy); // 指根
    c.quadraticCurveTo(cx+10,cy+12,cx-5,cy+20); // 掌侧
    c.quadraticCurveTo(cx-18,cy+22,cx-28,cy+18);c.closePath();c.fill();c.stroke();
    // 掌心纹理（掌纹三线）
    c.strokeStyle='rgba(80,50,25,'+a*0.35+')';c.lineWidth=0.8;
    c.beginPath();c.moveTo(cx-20,cy+5);c.quadraticCurveTo(cx-10,cy,cx,cy+2);c.stroke();
    c.beginPath();c.moveTo(cx-22,cy-2);c.quadraticCurveTo(cx-12,cy-5,cx-2,cy-3);c.stroke();
    c.beginPath();c.moveTo(cx-18,cy+10);c.quadraticCurveTo(cx-8,cy+8,cx+2,cy+10);c.stroke();
    // 三指（食、中、无名指，上伸微张）
    c.fillStyle='rgba(170,130,80,'+a*0.65+')';
    c.strokeStyle='rgba(50,32,15,'+a*0.8+')';c.lineWidth=1.2;
    for(var i=0;i<3;i++){
      var fAng=-0.8+i*0.25+grasp*(i-1);
      var fx=cx-5+i*8, fy=cy-20-p*2;
      var fLen=20+p*4+Math.abs(i-1)*3; // 中指最长
      // 指节（两节）
      var mx=fx+Math.cos(fAng)*fLen*0.5;
      var my=fy+Math.sin(fAng)*fLen*0.5;
      var ex=fx+Math.cos(fAng)*fLen;
      var ey=fy+Math.sin(fAng)*fLen;
      // 近节
      c.beginPath();
      c.moveTo(fx-3,fy);c.lineTo(mx-2,my);c.lineTo(mx+2,my);c.lineTo(fx+3,fy);c.closePath();c.fill();c.stroke();
      // 远节
      c.beginPath();
      c.moveTo(mx-2,my);c.lineTo(ex-1.5,ey);c.lineTo(ex+1.5,ey);c.lineTo(mx+2,my);c.closePath();c.fill();c.stroke();
      // 指甲
      c.fillStyle='rgba(220,190,150,'+a*0.7+')';
      c.beginPath();c.ellipse(ex,ey,2,1.5,fAng,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(170,130,80,'+a*0.65+')';
      // 关节点
      c.fillStyle='rgba(120,80,45,'+a*0.5+')';
      c.beginPath();c.arc(mx,my,2,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(170,130,80,'+a*0.65+')';
    }
    // 拇指（侧伸，与三指相对）
    var thAng=0.5+grasp;
    var thLen=15+p*3;
    var thx=cx-18, thy=cy-8;
    var thmx=thx+Math.cos(thAng)*thLen*0.5;
    var thmy=thy+Math.sin(thAng)*thLen*0.5;
    var thex=thx+Math.cos(thAng)*thLen;
    var they=thy+Math.sin(thAng)*thLen;
    // 近节
    c.beginPath();
    c.moveTo(thx,thy-3);c.lineTo(thmx,thmy-2);c.lineTo(thmx,thmy+2);c.lineTo(thx,thy+3);c.closePath();c.fill();c.stroke();
    // 远节
    c.beginPath();
    c.moveTo(thmx,thmy-2);c.lineTo(thex,they-1.5);c.lineTo(thex,they+1.5);c.lineTo(thmx,thmy+2);c.closePath();c.fill();c.stroke();
    // 拇指甲
    c.fillStyle='rgba(220,190,150,'+a*0.7+')';
    c.beginPath();c.ellipse(thex,they,2,1.5,thAng,0,Math.PI*2);c.fill();
    // 腕（下端收束）
    c.fillStyle='rgba(150,110,70,'+a*0.5+')';
    c.beginPath();
    c.moveTo(cx-28,cy+18);c.quadraticCurveTo(cx-30,cy+28,cx-25,cy+35);
    c.lineTo(cx-15,cy+35);c.quadraticCurveTo(cx-10,cy+28,cx-5,cy+20);c.closePath();c.fill();c.stroke();
    c.restore();
  },
  '父':function(c,p,cx,cy){

    c.save();c.globalAlpha=a;

    // 写意父亲：持斧/杖，权威形象，人物轮廓

    c.quadraticCurveTo(cx+12,bY-20,cx+15,bY-10); // 右肩
    c.quadraticCurveTo(cx+18,bY,cx+12,bY+15); // 右侧

    // 眼（一点墨）

    // 手臂（持斧，前伸）

    // 手（握斧柄）

  },
  '禾':function(c,p,cx,cy){
    var a=Math.sin(p*Math.PI);
    if(a<0.02)return;
    c.save();c.globalAlpha=a;
    c.lineCap='round';c.lineJoin='round';
    // 写意禾谷：成熟垂穗，风吹摆动，叶片飘摇
    // 参考国画谷穗：墨线勾茎、淡墨染叶、浓墨点穗
    var bY=cy+50;
    var sway=Math.sin(p*2.5)*4; // 风吹摆动
    // 地面（淡墨坡）
    c.fillStyle='rgba(80,60,30,'+a*0.1+')';
    c.beginPath();c.ellipse(cx,bY+5,35,4,0,0,Math.PI*2);c.fill();
    // 茎（主茎，微弯）
    c.strokeStyle='rgba(100,80,30,'+a*0.8+')';c.lineWidth=2.5;
    c.beginPath();c.moveTo(cx,bY);
    c.quadraticCurveTo(cx+sway*0.5,bY-25,cx+sway,bY-55-p*10);c.stroke();
    // 节（茎上节点，3个）
    c.fillStyle='rgba(80,60,25,'+a*0.6+')';
    for(var i=0;i<3;i++){
      var ny=bY-15-i*15;
      c.beginPath();c.ellipse(cx+sway*(i*0.3),ny,2,1.5,0,0,Math.PI*2);c.fill();
    }
    // 叶（3片，左右交替，随风飘摇）
    c.fillStyle='rgba(110,100,35,'+a*0.55+')';
    c.strokeStyle='rgba(70,55,20,'+a*0.6+')';c.lineWidth=0.8;
    for(var i=0;i<3;i++){
      var ly=bY-12-i*14;
      var ld=(i%2===0)?1:-1; // 左右交替
      var leafSway=Math.sin(p*3+i)*3; // 叶片飘摇
      var lx=cx+sway*(i*0.3);
      c.beginPath();c.moveTo(lx,ly);
      c.quadraticCurveTo(lx+ld*12+leafSway,ly-4,lx+ld*20+p*2+leafSway,ly+3);
      c.quadraticCurveTo(lx+ld*10,ly+2,lx,ly);c.fill();c.stroke();
      // 叶脉（中脉一线）
      c.strokeStyle='rgba(60,45,15,'+a*0.3+')';c.lineWidth=0.5;
      c.beginPath();c.moveTo(lx,ly);c.lineTo(lx+ld*15+leafSway*0.5,ly);c.stroke();
      c.strokeStyle='rgba(70,55,20,'+a*0.6+')';c.lineWidth=0.8;
    }
    // 穗（下垂成熟谷穗，饱满）

  '年':function(c,p,cx,cy){

    // === 福字小灯笼光晕（背景）===
    var lg=c.createRadialGradient(cx,cy,0,cx,cy,100+p*20);
    lg.addColorStop(0,'rgba(255,100,30,'+a*0.1+')');
    lg.addColorStop(0.5,'rgba(255,50,20,'+a*0.05+')');
    lg.addColorStop(1,'rgba(200,20,0,0)');
    c.fillStyle=lg;c.beginPath();c.arc(cx,cy,100+p*20,0,Math.PI*2);c.fill();
    c.restore();
  },
};
function drawFx(){
  var c=C.fx,ctx=X.fx,w=c.width,h=c.height;
  ctx.clearRect(0,0,w,h);
  if(!S.fx||!S.hov)return;
  if(S.fxP<1)S.fxP=Math.min(1,S.fxP+1/180);
  var cx=w/2,cy=h/2+S.sphereOffY;
  var fn=FX[S.hov];
  if(fn)fn(ctx,S.fxP,cx,cy);
  else{
    var a=Math.sin(S.fxP*Math.PI)*0.7;
    ctx.save();ctx.globalAlpha=a;
    ctx.shadowColor='rgba(201,168,76,0.5)';ctx.shadowBlur=22;
    drawGlyph(ctx,S.hov,cx,cy-30,55+S.fxP*40,'#f5e8c0',true);
    ctx.restore();
  }
  if(S.fxP>0.4){
    var db=DB[S.hov];
    if(db){
      var fadeIn=Math.min(1,(S.fxP-0.4)*2.5);
      ctx.save();ctx.textAlign='center';
      ctx.font='600 22px "Microsoft YaHei","微软雅黑","Noto Serif SC",sans-serif';
      ctx.fillStyle='rgba(255,248,225,'+(0.9*fadeIn)+')';
      ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=8;
      ctx.fillText(db.modern+' · '+db.mean,cx,cy+75);
      ctx.font='400 13px "Microsoft YaHei","微软雅黑",serif';
      ctx.fillStyle='rgba(220,200,160,'+(0.6*fadeIn)+')';
      ctx.shadowBlur=4;
      ctx.fillText('[ '+db.py+' ] · '+db.cat,cx,cy+98);
      ctx.restore();
    }
  }
}

/* ===== 交互 ===== */
function detHov(mx,my){
  if(S.mini){S.hov=null;sc.style.cursor='default';return;}
  var w=sc.width,h=sc.height;
  if(w<10)return;
  var cx=w/2,cy=h/2+S.sphereOffY;
  var best=null,bd=Infinity;
  for(var i=0;i<S.pts.length;i++){
    var pt=S.pts[i];
    var rp=rot3(pt,S.rx,S.ry);
    if(rp.z<0.05)continue;
    var zz=rp.z*S.r;
    var scale=FOCAL/(FOCAL-zz);
    var px=cx+rp.x*S.r*scale,py=cy+rp.y*S.r*scale;
    var hitR=S.csz*scale*0.6;
    var d=Math.hypot(mx-px,my-py);
    if(d<hitR&&d<bd){bd=d;best=CHARS[pt.ci];}
  }
  if(best!==S.hov){
    S.hov=best;
    if(best){S.fx=true;S.fxP=0;}else{S.fx=false;S.fxP=0;}
    sc.style.cursor=best?'pointer':'grab';
  }
}

sc.addEventListener('mousedown',function(e){S.drag=true;S.lm={x:e.clientX,y:e.clientY};S.vx=0;S.vy=0;S._dragT=performance.now();e.preventDefault();});
sc.addEventListener('mousemove',function(e){
  if(S.drag){
    var dx=e.clientX-S.lm.x, dy=e.clientY-S.lm.y;
    var now=performance.now();
    var dtm=Math.max(1,now-(S._dragT||now-16));
    S._dragT=now;
    // 瞬时速度（rad/s），基于实际时间差
    var instVy=dx*0.008/(dtm/1000);
    var instVx=dy*0.008/(dtm/1000);
    // 平滑追踪速度（低通滤波），使手感跟手且不抖动
    var smooth=0.55;
    S.vy=S.vy*(1-smooth)+instVy*smooth;
    S.vx=S.vx*(1-smooth)+instVx*smooth;
    // 速度上限：中速（约1.8 rad/s ≈ 103°/s）
    var maxV=1.8;
    var sp=Math.hypot(S.vy,S.vx);
    if(sp>maxV){S.vy*=maxV/sp;S.vx*=maxV/sp;}
    // 直接按鼠标位移旋转（跟手）
    S.ry+=dx*0.008;
    S.rx+=dy*0.008;
    S.rx=Math.max(-Math.PI/3.5,Math.min(Math.PI/3.5,S.rx));
    S.lm={x:e.clientX,y:e.clientY};
  }
  var rect=sc.getBoundingClientRect();
  detHov(e.clientX-rect.left,e.clientY-rect.top);
});

/* ===== 收回墨扩散 ===== */
function retractExpanded(){
  if(!S.expanded)return;
  S.expanded=false;
  S.inkOn=true; // 进入收回动画
  S.inkSpread=false;
  // 清除hover/fx/shock
  S.hov=null;S.fx=false;S.fxP=0;
  S.shockOp=0;S.shockR=0;S.burstPts=[];
  updateButtonState();
}

function collapseSphere(){
  if(S.mini)return;
  S.mini=true;
  S.animating=true;S.animT=0;
  VP.classList.add('collapsed');
  // 立即关闭墨水/展开状态
  S.inkSpread=false;S.inkOn=false;S.inkOp=0;S.inter=0;S.expanded=false;S.inkR=0;
  S.hov=null;S.fx=false;S.fxP=0;
  S.shockOp=0;S.shockR=0;S.burstPts=[];
  resize();
  updateButtonState();
}
function expandSphere(){
  S.mini=false;
  S.animating=true;S.animT=0;
  VP.classList.remove('collapsed');
  S.inkSpread=false;S.inkOn=false;S.inkOp=0;S.expanded=false;S.inkR=0;
  S.shockOp=0;S.shockR=0;S.burstPts=[];
  resize();
  updateButtonState();
}

/* ===== 字形影像生成（拓片/实物） ===== */
function makeGlyphCanvas(ch,style,size){
  size=size||160;
  var cv=document.createElement('canvas');
  cv.width=size;cv.height=size;
  var cx=cv.getContext('2d');
  var pad=size*0.12;
  var drawSize=size-pad*2;
  var glyph=G[ch];
  if(!glyph)return cv;
  if(style==='rubbing'){
    // 拓片风格：黑底白字，墨迹质感
    cx.fillStyle='#0a0604';cx.fillRect(0,0,size,size);
    // 添加噪声纹理（拓片斑驳效果）
    for(var i=0;i<size*size*0.06;i++){
      var nx=Math.random()*size,ny=Math.random()*size;
      var na=0.05+Math.random()*0.15;
      cx.fillStyle='rgba(255,255,255,'+na+')';
      cx.fillRect(nx,ny,1+Math.random()*2,1+Math.random()*2);
    }
    // 添加假裂纹
    cx.strokeStyle='rgba(180,160,120,0.12)';cx.lineWidth=0.8;
    for(var i=0;i<4;i++){
      cx.beginPath();
      var sx=Math.random()*size,sy=Math.random()*size;
      cx.moveTo(sx,sy);
      for(var j=0;j<5;j++){
        cx.lineTo(sx+(Math.random()-0.5)*40,sy+(Math.random()-0.5)*40);
        sx+=(Math.random()-0.5)*40;sy+=(Math.random()-0.5)*40;
      }
      cx.stroke();
    }
    // 绘制白色字形
    cx.strokeStyle='rgba(240,230,200,0.92)';cx.fillStyle='rgba(240,230,200,0.92)';
    cx.lineCap='butt';cx.lineJoin='miter';cx.miterLimit=3;
    drawGlyphPaths(cx,glyph,pad,pad,drawSize);
    // 边缘磨损
    for(var i=0;i<80;i++){
      var ex=Math.random()<0.5?Math.random()*8:size-Math.random()*8;
      var ey=Math.random()*size;
      cx.fillStyle='rgba(255,255,255,'+(0.05+Math.random()*0.15)+')';
      cx.fillRect(ex,ey,2+Math.random()*4,1+Math.random()*3);
    }
  } else {
    // 实物风格：骨质黄底，深褐刻字，钻凿与裂纹
    var bg=cx.createLinearGradient(0,0,size,size);
    bg.addColorStop(0,'#d4b87a');bg.addColorStop(0.5,'#c9a860');bg.addColorStop(1,'#b8924a');
    cx.fillStyle=bg;cx.fillRect(0,0,size,size);
    // 骨质纹理
    for(var y=0;y<size;y+=3){
      cx.fillStyle='rgba(139,100,50,'+(0.02+Math.sin(y*0.15)*0.015)+')';
      cx.fillRect(0,y,size,1);
    }
    // 骨面斑点
    for(var i=0;i<30;i++){
      var bx=Math.random()*size,by=Math.random()*size;
      var br=1+Math.random()*3;
      var bg2=cx.createRadialGradient(bx,by,0,bx,by,br);
      bg2.addColorStop(0,'rgba(120,80,30,0.15)');bg2.addColorStop(1,'rgba(120,80,30,0)');
      cx.fillStyle=bg2;cx.beginPath();cx.arc(bx,by,br,0,Math.PI*2);cx.fill();
    }
    // 钻凿痕迹（椭圆坑）
    var drillPts=[[0.2,0.25],[0.78,0.2],[0.25,0.75],[0.8,0.8]];
    for(var i=0;i<drillPts.length;i++){
      var dx=drillPts[i][0]*size,dy=drillPts[i][1]*size;
      var dr=4+Math.random()*3;
      var dg=cx.createRadialGradient(dx,dy,0,dx,dy,dr);
      dg.addColorStop(0,'rgba(60,35,10,0.35)');dg.addColorStop(0.6,'rgba(80,50,20,0.15)');dg.addColorStop(1,'rgba(80,50,20,0)');
      cx.fillStyle=dg;cx.beginPath();cx.arc(dx,dy,dr,0,Math.PI*2);cx.fill();
    }
    // 灼裂纹（卜兆纹）
    cx.strokeStyle='rgba(60,35,10,0.25)';cx.lineWidth=1;
    for(var i=0;i<3;i++){
      cx.beginPath();
      var csx=pad+Math.random()*drawSize,csy=pad+Math.random()*drawSize;
      cx.moveTo(csx,csy);
      var cpx=csx,cpy=csy;
      for(var j=0;j<4;j++){
        cpx+=(Math.random()-0.5)*30;cpy+=(Math.random()-0.5)*30;
        cx.lineTo(cpx,cpy);
      }
      cx.stroke();
    }
    // 绘制深褐色字形（刀刻效果）
    cx.strokeStyle='rgba(50,28,8,0.88)';cx.fillStyle='rgba(50,28,8,0.88)';
    cx.lineCap='butt';cx.lineJoin='miter';cx.miterLimit=3;
    drawGlyphPaths(cx,glyph,pad,pad,drawSize);
    // 刻痕内阴影效果（模拟刀刻凹槽）
    cx.strokeStyle='rgba(30,15,5,0.25)';cx.lineWidth=1;
    drawGlyphPaths(cx,glyph,pad+1,pad+1,drawSize);
  }
  return cv;
}

function drawGlyphPaths(cx,glyph,ox,oy,sz){
  for(var i=0;i<glyph.length;i++){
    var s=glyph[i];
    cx.lineWidth=s.w*sz;
    var p=s.p;
    if(s.t==='line'||s.t==='lseq'){
      cx.beginPath();cx.moveTo(ox+p[0][0]*sz,oy+p[0][1]*sz);
      for(var j=1;j<p.length;j++) cx.lineTo(ox+p[j][0]*sz,oy+p[j][1]*sz);
      cx.stroke();
    } else if(s.t==='curve'){
      cx.beginPath();cx.moveTo(ox+p[0][0]*sz,oy+p[0][1]*sz);
      for(var j=1;j<p.length-1;j+=2){
        var cp=p[j],ep=p[j+1]||p[j];
        cx.quadraticCurveTo(ox+cp[0]*sz,oy+cp[1]*sz,ox+ep[0]*sz,oy+ep[1]*sz);
      }
      cx.stroke();
    } else if(s.t==='ellipse'){
      cx.beginPath();
      var ecx=ox+p[0][0]*sz,ecy=oy+p[0][1]*sz,erx=p[1][0]*sz,ery=p[1][1]*sz;
      for(var k=0;k<=10;k++){
        var ea=(k/10)*Math.PI*2;
        var epx=ecx+Math.cos(ea)*erx,epy=ecy+Math.sin(ea)*ery;
        k===0?cx.moveTo(epx,epy):cx.lineTo(epx,epy);
      }
      cx.stroke();
    } else if(s.t==='rect'){
      var x1=p[0][0],y1=p[0][1],rw=p[1][0],rh=p[1][1];
      cx.beginPath();
      cx.moveTo(ox+x1*sz,oy+y1*sz);
      cx.lineTo(ox+(x1+rw)*sz,oy+y1*sz);
      cx.lineTo(ox+(x1+rw)*sz,oy+(y1+rh)*sz);
      cx.lineTo(ox+x1*sz,oy+(y1+rh)*sz);
      cx.closePath();cx.stroke();
    } else if(s.t==='dot'){
      var dx=p[1][0]*sz,dy=p[1][1]*sz;
      cx.beginPath();
      cx.moveTo(ox+p[0][0]*sz-dx,oy+p[0][1]*sz);
      cx.lineTo(ox+p[0][0]*sz,oy+p[0][1]*sz-dy);
      cx.lineTo(ox+p[0][0]*sz+dx,oy+p[0][1]*sz);
      cx.lineTo(ox+p[0][0]*sz,oy+p[0][1]*sz+dy);
      cx.closePath();cx.fill();
    }
  }
}

  p.classList.remove('show');void p.offsetWidth;p.classList.add('show');
