/* ===== 主循环 ===== */
function update(dt){
  S.t+=dt*60;
  S._dt=dt;

  // 旋转：基于dt的时间驱动，确保匀速不闪
  var autoSpeed=S.mini?S.autoV*0.35:(S.expanded?S.autoV*0.6:S.autoV);
  if(S.drag){
    // 拖拽时：旋转已在鼠标事件中直接应用，这里惯性速度已在mousemove中平滑更新
  } else {
    // 非拖拽：惯性衰减 + 回归慢速自转
    // 当惯性速度大于自动速度时，按摩擦衰减；小于时平滑过渡到自动速度
    var fric=Math.pow(0.92,dt*60); // 摩擦系数
    S.vy*=fric;
    S.vx*=fric;
    // 当惯性速度很小时，平滑过渡到自动慢转
    if(Math.abs(S.vy)<autoSpeed*1.5){
      S.vy+=(autoSpeed-S.vy)*Math.min(1,dt*0.8);
    }
    S.ry+=S.vy*dt;
    S.rx+=S.vx*dt;
  }
  S.rx=Math.max(-Math.PI/3.5,Math.min(Math.PI/3.5,S.rx));

  // 交互程度：expanded时保持最大
  var tI=(S.drag||S.expanded)?1:0;
  S.inter+=(tI-S.inter)*Math.min(1,dt*(S.expanded?4:8));

  // mini模式的目标值：使用dt驱动的lerp，与CSS transition(0.55s)同步
  var lerpK=Math.min(1,dt*7); // 约0.4-0.5秒收敛
  var targetOff=S.mini?-sc.height/2+42:0;
  var targetR=S.mini?35:(S.expanded?200:200);
  var targetSz=S.mini?8:(S.expanded?24:24);

  S.sphereOffY+=(targetOff-S.sphereOffY)*lerpK;
  S.r+=(targetR*(1+S.inter*0.5)-S.r)*lerpK;
  S.csz+=(targetSz*(1+S.inter*0.4)-S.csz)*lerpK;

  // 折叠/展开过程中每帧resize，确保canvas尺寸同步CSS过渡
  if(S.animating){
    S.animT+=dt;
    resize();
    if(S.animT>0.6)S.animating=false;
  }

  // 墨水效果
  if(S.inter>0.35&&!S.inkSpread&&!S.inkOn&&!S.mini&&!S.expanded){
    S.inkSpread=true;S.inkOn=true;S.inkR=S.r*0.4;initInk();
  }
  if(S.expanded||S.inkSpread){
    S.inkOp=Math.min(1,S.inkOp+dt*2);
  } else if(S.inkOn){
    // 收回中：比例衰减（自然ease-out）
    S.inkSpread=false;
    S.inkR*=Math.pow(0.02,dt*1.4); // ~0.7秒收回
    S.inkOp=Math.max(0,S.inkOp-dt*2.5);
    if(S.inkR<8&&S.inkOp<0.05){S.inkOn=false;S.inkR=0;S.inkOp=0;updateButtonState();}
  } else {
    S.inkOp=Math.max(0,S.inkOp-dt*2);
  }

  updateSubtitle();
}

var lastT=0;
function frame(t){
  var dt=Math.min((t-lastT)/1000,0.05);
  lastT=t;
  update(dt);
  drawBg();drawParts();drawInk();drawStars();drawSphere();drawFx();
  requestAnimationFrame(frame);
}

/* ===== 启动 ===== */
function init(){
  resize();
  initParts();initStars();
  // 初始定位副标题
  updateSubtitle();
  requestAnimationFrame(frame);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
window.addEventListener('load',function(){setTimeout(resize,50);setTimeout(function(){updateSubtitle();updateButtonState();},100);});
window.addEventListener('resize',function(){resize();updateSubtitle();});

/* ===== 拓片识别上传面板 ===== */
var uploadPanel = document.getElementById('uploadPanel');
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var uploadBtn = document.getElementById('uploadBtn');
var previewArea = document.getElementById('previewArea');
var previewList = document.getElementById('previewList');
var analyzeBtn = document.getElementById('analyzeBtn');
var clearBtn = document.getElementById('clearBtn');
var resultArea = document.getElementById('resultArea');
var resultContent = document.getElementById('resultContent');
var resultImages = document.getElementById('resultImages');

var uploadedFiles = [];

// 点击上传按钮或拖拽区域触发文件选择
uploadBtn.addEventListener('click', function(e){e.stopPropagation();fileInput.click();});
dropZone.addEventListener('click', function(){fileInput.click();});

// 文件选择
fileInput.addEventListener('change', function(){
  handleFiles(this.files);
  this.value = '';
});

// 拖拽
dropZone.addEventListener('dragover', function(e){e.preventDefault();e.stopPropagation();this.classList.add('drag-over');});
dropZone.addEventListener('dragleave', function(e){e.preventDefault();e.stopPropagation();this.classList.remove('drag-over');});
dropZone.addEventListener('drop', function(e){
  e.preventDefault();e.stopPropagation();
  this.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files){
  for(var i=0;i<files.length;i++){
    var f = files[i];
    if(!f.type.match(/image\/|application\/pdf/)) continue;
    uploadedFiles.push(f);
    addPreview(f, uploadedFiles.length-1);
  }
  if(uploadedFiles.length > 0){
    dropZone.style.display = 'none';
    previewArea.style.display = 'block';
  }
}

function addPreview(file, idx){
  var div = document.createElement('div');
  div.className = 'preview-item';
  if(file.type === 'application/pdf'){
    div.innerHTML = '<div class="pdf-badge">PDF</div><div class="file-name">'+file.name+'</div>';
  } else {
    var url = URL.createObjectURL(file);
    div.innerHTML = '<img src="'+url+'" alt="'+file.name+'"><button class="remove-btn">&times;</button><div class="file-name">'+file.name+'</div>';
  }
  var rmBtn = div.querySelector('.remove-btn');
  if(rmBtn){
    rmBtn.addEventListener('click', function(e){
      e.stopPropagation();
      uploadedFiles.splice(idx,1);
      div.remove();
      if(uploadedFiles.length === 0){
        dropZone.style.display = '';
        previewArea.style.display = 'none';
      }
      rebuildPreview();
    });
  }
  previewList.appendChild(div);
}

function rebuildPreview(){
  previewList.innerHTML = '';
  uploadedFiles.forEach(function(f,i){
    addPreview(f,i);
  });
}

// 清除按钮
clearBtn.addEventListener('click', function(){
  uploadedFiles = [];
  previewList.innerHTML = '';
  dropZone.style.display = '';
  previewArea.style.display = 'none';
  resultArea.style.display = 'none';
});

// 分析按钮
analyzeBtn.addEventListener('click', function(){
  if(uploadedFiles.length === 0) return;
  // 显示加载动画
  analyzeBtn.textContent = '识别中...';
  analyzeBtn.classList.add('analyzing');
  // 模拟AI识别（2-3秒延迟）
  setTimeout(function(){
    analyzeBtn.textContent = '开始识别';
    analyzeBtn.classList.remove('analyzing');
    showMockResult();
  }, 2500);
});

// 模拟识别结果
function showMockResult(){
  resultArea.style.display = 'block';
  // 随机选取一些甲骨文字模拟识别
  var allChars = Object.keys(DB);
  var matched = [];
  var count = 3 + Math.floor(Math.random()*4);
  var shuffled = allChars.slice().sort(function(){return Math.random()-0.5;});
  for(var i=0;i<count&&i<shuffled.length;i++){
    var ch = shuffled[i];
    var d = DB[ch];
    var conf = (65+Math.floor(Math.random()*30));
    matched.push({ch:ch, modern:d.modern, mean:d.mean, conf:conf});
  }
  matched.sort(function(a,b){return b.conf-a.conf;});
  
  var html = '<p>从拓片中识别出以下甲骨文字，按置信度排列：</p>';
  html += '<div class="glyph-matches">';
  matched.forEach(function(m){
    html += '<div class="glyph-match" data-ch="'+m.ch+'">';
    html += '<div class="gm-char">'+m.ch+'</div>';
    html += '<div class="gm-name">'+m.modern+' ('+m.mean+')</div>';
    html += '<div class="gm-conf">'+m.conf+'%</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<p style="margin-top:12px">根据识别出的关键字「'+matched.slice(0,2).map(function(m){return m.mean}).join('」「')+'」，推测此片卜辞可能与<strong>'+getMockTopic(matched)+'</strong>相关。';
  html += '</p><p>卜辞内容大致为：' + getMockDivination(matched) + '</p>';
  
  resultContent.innerHTML = html;
  
  // 显示上传的预览图
  resultImages.innerHTML = '';
  previewList.querySelectorAll('.preview-item img').forEach(function(img){
    var clone = img.cloneNode();
    clone.style.width = '100px'; clone.style.height = '100px';
    clone.style.borderRadius = '6px'; clone.style.border = '1px solid var(--edge)';
    resultImages.appendChild(clone);
  });
  
  // 点击匹配字跳转到详情
  resultContent.querySelectorAll('.glyph-match').forEach(function(el){
    el.addEventListener('click', function(){
      var ch = this.getAttribute('data-ch');
      if(DB[ch]) showDetail(ch);
    });
  });
  
  // 滚动到结果区
  resultArea.scrollIntoView({behavior:'smooth', block:'start'});
}

function getMockTopic(matched){
  var topics = ['祭祀占卜','农业丰歉','战争征伐','天气占卜','生育健康','疾病治疗','田猎出行','建筑营造'];
  return topics[Math.floor(Math.random()*topics.length)];
}

function getMockDivination(matched){
  var templates = [
    '贞问：近日是否有雨？帝若允诺，则农作物丰收。',
    '贞问：某日出行是否吉利？是否有灾祸？',
    '贞问：此次田猎能否获得大量猎物？',
    '贞问：祭祀先祖，是否需要用牲牢若干？',
    '贞问：敌方是否有侵扰？我方能否取胜？',
    '贞问：王之疾痛，是否能够痊愈？',
  ];
  return templates[Math.floor(Math.random()*templates.length)];
}

// 生成真实可扫描二维码（使用qrcode-generator库）
(function(){
  var cv = document.getElementById('qrCanvas');
  if(!cv)return;
  var cx = cv.getContext('2d');
  var sz = cv.width; // 200px高清
  // 生成真实QR码（编码当前页面地址，手机扫码可访问）
  var qrUrl = 'http://113.45.210.232:8080';
  try {
    var qr = qrcode(0, 'M'); // type 0=auto, error correction M(15%)
    qr.addData(qrUrl);
    qr.make();
    var modules = qr.getModuleCount();
    var cellSz = sz / modules;
    // 绘制底色（宣纸色）
    cx.fillStyle = '#f5edd6';
    cx.fillRect(0, 0, sz, sz);
    // 绘制QR码模块（墨色）
    cx.fillStyle = '#2a1a0a';
    for(var r = 0; r < modules; r++){
      for(var c = 0; c < modules; c++){
        if(qr.isDark(r, c)){
          cx.fillRect(c*cellSz, r*cellSz, cellSz*1.05, cellSz*1.05);
        }
      }
    }
  } catch(e) {
    // 库加载失败时的降级方案：绘制装饰图案
    cx.fillStyle = '#f5edd6';
    cx.fillRect(0, 0, sz, sz);
    cx.fillStyle = '#2a1a0a';
    cx.font = 'bold 16px serif';
    cx.textAlign = 'center';
    cx.fillText('甲骨文', sz/2, sz/2 - 8);
    cx.font = '12px serif';
    cx.fillText('扫码上传', sz/2, sz/2 + 12);
  }
  // 鼎盖点击交互
  var ding=document.getElementById('dingQr');
  if(ding){
    ding.addEventListener('click',function(e){
      e.stopPropagation();
      ding.classList.toggle('open');
    });
    document.addEventListener('click',function(e){
      if(!ding.contains(e.target))ding.classList.remove('open');
    });
  }
})();

})();
